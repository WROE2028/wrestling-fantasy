function schoolColorFor(school) {
  if (SCHOOL_COLORS[school]) return SCHOOL_COLORS[school];
  let h = 0;
  for (let i = 0; i < (school || '').length; i++) h = ((h << 5) - h + school.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return { bg: `hsl(${hue}, 55%, 25%)`, fg: `hsl(${hue}, 65%, 80%)` };
}

const uid = () => Math.random().toString(36).slice(2, 10);

function buildSnakeOrder(managerIds, rounds) {
  const order = [];
  for (let r = 0; r < rounds; r++) {
    const round = r % 2 === 0 ? [...managerIds] : [...managerIds].reverse();
    round.forEach(mid => order.push({ round: r + 1, managerId: mid }));
  }
  return order;
}

// Round-robin scheduler: returns array of weeks, each week is array of {managerA, managerB}
// For odd N, one team gets a bye per week
function generateRoundRobin(managerIds, numWeeks) {
  const teams = [...managerIds];
  if (teams.length < 2) return [];
  if (teams.length % 2 === 1) teams.push(null); // bye marker
  const n = teams.length;
  const baseRounds = n - 1;
  const weeks = [];
  for (let w = 0; w < numWeeks; w++) {
    const r = w % baseRounds;
    // rotate: build the rotation for round r
    const rotation = [teams[0], ...teams.slice(1)];
    // shift the non-fixed teams by r positions
    const non = teams.slice(1);
    const shifted = [...non.slice(non.length - r), ...non.slice(0, non.length - r)];
    const arrangement = [teams[0], ...shifted];
    const pairs = [];
    for (let i = 0; i < n / 2; i++) {
      const a = arrangement[i];
      const b = arrangement[n - 1 - i];
      if (a !== null && b !== null) pairs.push({ managerA: a, managerB: b });
    }
    weeks.push(pairs);
  }
  return weeks;
}

function getSeasonStatus(league) {
  if (!league.autoWeek) return { status: 'manual', week: league.manualWeek, label: `Week ${league.manualWeek}` };
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(league.seasonStart + 'T00:00:00');
  const end = new Date(league.seasonEnd + 'T00:00:00');
  if (today < start) {
    const days = Math.ceil((start - today) / (1000 * 60 * 60 * 24));
    return { status: 'preseason', week: 0, label: `Preseason · ${days}d to start` };
  }
  if (today > end) return { status: 'offseason', week: 0, label: 'Off-season' };
  const days = Math.floor((today - start) / (1000 * 60 * 60 * 24));
  const week = Math.floor(days / 7) + 1;
  return { status: 'inseason', week, label: `Week ${week}` };
}

function getCurrentWeek(league) {
  const s = getSeasonStatus(league);
  return s.week || league.manualWeek || 1;
}

// ===== Weekly score calculator (canonical — used by matchups, standings, teams) =====
// Wrestler points come from weeklyResults; coach points come from settled pickem duals with scores.
// Coach scoring:
//   Win  by  1-10 pts → +5
//   Win  by 11-20 pts → +10
//   Win  by 21+  pts → +15
//   Any loss          → -10  (flat)
// Falls back to +/-10 flat if no score is recorded (legacy duals).
function coachPointsForDual(p, sideIsWinner) {
  if (!sideIsWinner) return -10;  // any loss is flat -10
  const sA = parseInt(p.scoreA), sB = parseInt(p.scoreB);
  if (!isFinite(sA) || !isFinite(sB)) return 10;  // legacy fallback for missing scores
  const margin = Math.abs(sA - sB);
  return margin >= 21 ? 15 : margin >= 11 ? 10 : 5;
}

    coachRoster.forEach(c => {

      if (!sch) return;
      if (sch === tA) {
        const pts = coachPointsForDual(p, p.winner === 'A');
        coachPts += pts;
        coachDetail.push({ coach: c.name, school: c.school, opponent: p.teamB, result: pts > 0 ? 'W' : 'L', pts, scoreA: p.scoreA, scoreB: p.scoreB });
      } else if (sch === tB) {
        const pts = coachPointsForDual(p, p.winner === 'B');
        coachPts += pts;
        coachDetail.push({ coach: c.name, school: c.school, opponent: p.teamA, result: pts > 0 ? 'W' : 'L', pts, scoreA: p.scoreA, scoreB: p.scoreB });
      }
    });
  });
  return { wrestlerPts, coachPts, total: wrestlerPts + coachPts, coachDetail };
}

function getManagerSeasonTotal(managerId, state) {
  const weeks = new Set([
    ...Object.keys(state.weeklyResults || {}),
    ...(state.pickems || []).map(p => String(p.week)),
  ]);
  let wrestler = 0, coach = 0;
  weeks.forEach(w => {
    const r = getManagerWeekTotal(managerId, w, state);
    wrestler += r.wrestlerPts;
    coach += r.coachPts;
  });
  return { wrestler, coach, total: wrestler + coach };
}

// Live record for a coach's program — derived from settled Pick'em duals
function getCoachRecord(coach, state) {
  if (!coach) return { wins: 0, losses: 0 };
  const sch = (coach.school || '').toLowerCase().trim();
  if (!sch) return { wins: 0, losses: 0 };
  let wins = 0, losses = 0;
  (state.pickems || []).forEach(p => {
    if (!p.winner) return;
    const tA = (p.teamA || '').toLowerCase().trim();
    const tB = (p.teamB || '').toLowerCase().trim();
    if (sch === tA) (p.winner === 'A' ? wins++ : losses++);
    else if (sch === tB) (p.winner === 'B' ? wins++ : losses++);
  });
  return { wins, losses };
}

// ===== Live wrestler stats — auto-derived from state.weeklyResults =====
// Walks every week, sums wins (positive-scoring results) and losses (negative).
function getWrestlerLiveRecord(wrestlerId, state) {
  let w = 0, l = 0;
  Object.values(state.weeklyResults || {}).forEach(weekData => {
    (weekData[wrestlerId] || []).forEach(r => {
      const s = SCORING[r.type];
      if (!s) return;
      if (s.for > 0) w++;
      else if (s.for < 0) l++;
    });
  });
  return { w, l };
}

// Returns an array of matches derived from weeklyResults, sorted by week ascending.
// Used by the profile card to auto-build a match log from logged scoring entries.
function getWrestlerLiveHistory(wrestlerId, state) {
  const out = [];
  Object.entries(state.weeklyResults || {}).forEach(([weekStr, weekData]) => {
    const week = parseInt(weekStr);
    (weekData[wrestlerId] || []).forEach((r, i) => {
      const s = SCORING[r.type];
      out.push({
        week,
        idx: i,
        type: r.type,
        label: s ? s.label : r.type,
        result: s && s.for > 0 ? 'W' : 'L',
        pts: s ? s.for : 0,
        note: r.note || '',
      });
    });
  });
  return out.sort((a, b) => a.week - b.week);
}

// Returns the last N results (W or L pills) for a wrestler in chronological order — used for the form bar.
function getWrestlerForm(wrestlerId, state, n = 5) {
  const hist = getWrestlerLiveHistory(wrestlerId, state);
  return hist.slice(-n).map(h => h.result);
}

// Re-rank wrestlers within a weight class after a move
function renormalizeRanks(items, key = 'weight') {
  // Group by key, sort by rank, re-assign 1..N
  const groups = {};
  items.forEach(it => {
    const k = it[key] !== undefined ? it[key] : 'all';
    if (!groups[k]) groups[k] = [];
    groups[k].push(it);
  });
  Object.values(groups).forEach(arr => {
    arr.sort((a, b) => a.rank - b.rank);
    arr.forEach((it, i) => { it.rank = i + 1; });
  });
  return [...items];
}

function moveRank(items, id, direction, groupKey) {
  // Swap ranks with the adjacent item in the same group
  const target = items.find(it => it.id === id);
  if (!target) return items;
  const groupVal = groupKey ? target[groupKey] : 'all';
  const group = items
    .filter(it => (groupKey ? it[groupKey] === groupVal : true))
    .sort((a, b) => a.rank - b.rank);
  const idx = group.findIndex(it => it.id === id);
  const swapWith = group[idx + direction];
  if (!swapWith) return items;
  return items.map(it => {
    if (it.id === target.id) return { ...it, rank: swapWith.rank };
    if (it.id === swapWith.id) return { ...it, rank: target.rank };
    return it;
  });
}

// ========== WRESTLER AVATAR (auto-generated from school colors + initials) ==========
// Renders a colored circle with the wrestler's initials in the school's accent color.
// If wrestler.photo is set, that takes precedence (uploaded photo or pasted URL).
// Sizes: 'xs' 24px · 'sm' 32px · 'md' 40px · 'lg' 64px · 'xl' 128px
// Year badge (FR/SO/JR/SR) shows in corner for sm+ sizes when wrestler.year is set.
function WrestlerAvatar({ wrestler, size = 'md', hideYear = false }) {
  if (!wrestler) return null;
  const px = { xs: 24, sm: 32, md: 40, lg: 64, xl: 128 }[size] || 40;
  const fontPx = Math.round(px * 0.42);
  const colors = schoolColorFor(wrestler.school);
  const initials = initialsOf(wrestler.name);

  // Year badge: only show for sm+ sizes (too small to read on xs)
  const showYearBadge = !hideYear && wrestler.year && px >= 32;
  const yearBadgePx = Math.max(14, Math.round(px * 0.38));
  const yearBadgeFontPx = Math.max(8, Math.round(yearBadgePx * 0.5));
  const yearBadgeColor = {
    FR: '#22c55e',   // green = fresh
    SO: '#3b82f6',   // blue = sophomore
    JR: '#f59e0b',   // amber = junior
    SR: '#ef4444',   // red = senior (last year)
    '5Y': '#a855f7', // purple = 5th year
    GR: '#a855f7',   // purple = grad
    HS: '#06b6d4',   // cyan = high school (2027 Watchlist)
  }[wrestler.year] || '#71717a';

  // Real photo wins over generated avatar
  const avatarInner = wrestler.photo ? (
    <img
      src={wrestler.photo}
      alt={wrestler.name}
      className="rounded-full object-cover"
      style={{ width: px, height: px, border: `2px solid ${colors.bg}`, display: 'block' }}
      onError={(e) => { e.target.style.display = 'none'; }}
    />
  ) : (
    <div className="rounded-full flex items-center justify-center select-none"
         style={{
           width: px, height: px,
           background: `linear-gradient(135deg, ${colors.bg} 0%, ${shadeColor(colors.bg, -15)} 100%)`,
           border: `2px solid ${colors.fg}`,
           color: colors.fg,
           fontWeight: 800,
           fontSize: fontPx,
           letterSpacing: '-0.02em',
           boxShadow: `inset 0 -${Math.round(px*0.08)}px ${Math.round(px*0.15)}px rgba(0,0,0,0.3)`,
         }}
         title={wrestler.school || ''}>
      {initials}
    </div>
  );

  // Wrap in a positioned container so we can absolute-position the year badge
  return (
    <div className="relative flex-shrink-0" style={{ width: px, height: px }}>
      {avatarInner}
      {showYearBadge && (
        <div
          className="absolute flex items-center justify-center rounded-full font-extrabold leading-none"
          style={{
            bottom: -2,
            right: -2,
            width: yearBadgePx,
            height: yearBadgePx,
            background: yearBadgeColor,
            color: '#ffffff',
            fontSize: yearBadgeFontPx,
            border: '1.5px solid #0a0a0a',
            boxShadow: '0 1px 3px rgba(0,0,0,0.5)',
            letterSpacing: '-0.04em',
          }}
          title={`Eligibility year: ${wrestler.year}`}
        >
          {wrestler.year}
        </div>
      )}
    </div>
  );
}
// Darken/lighten a hex color by a percentage (negative = darker). Handles 'hsl(...)' by passing through.
function shadeColor(color, percent) {
  if (!color || !color.startsWith('#')) return color;
  const num = parseInt(color.replace('#',''), 16);
  let r = (num >> 16) + Math.round(2.55 * percent);
  let g = ((num >> 8) & 0xff) + Math.round(2.55 * percent);
  let b = (num & 0xff) + Math.round(2.55 * percent);
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// ========== APP ==========
function App() {
  const [state, setState] = useState(loadState());
  const [tab, setTab] = useState('home');
  const [activeManager, setActiveManager] = useState(null);

  // ===== CLOUD SYNC (Firebase Firestore) =====
  // Commissioner mode: whoever has cloud.role === 'commissioner' pushes state to Firestore.
  // Viewers (cloud.role === 'viewer') subscribe and replace their local state with cloud state.
  const cloud = state.cloud || { enabled: false, leagueCode: null, role: 'commissioner', lastSync: null };
  const pushTimer = useRef(null);
  const hydratedRef = useRef(false);  // prevents viewer's first cloud snapshot from causing a save loop

  // Commissioner → Firestore (debounced 800ms)
  useEffect(() => {
    if (!cloud.enabled || cloud.role !== 'commissioner' || !cloud.leagueCode) return;
    const fb = getFirebase();
    if (!fb) return;
    clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(() => {
      // Strip cloud meta from payload so viewers don't get our local sync state
      const { cloud: _ignore, ...payload } = state;
      fb.db.collection('leagues').doc(cloud.leagueCode).set({
        state: JSON.stringify(payload),
        updatedAt: new Date().toISOString(),
        version: DATA_VERSION,
      }).then(() => {
        setState(s => ({ ...s, cloud: { ...s.cloud, lastSync: new Date().toISOString() } }));
      }).catch(e => console.warn('Cloud push failed:', e));
    }, 800);
    return () => clearTimeout(pushTimer.current);
  }, [state, cloud.enabled, cloud.role, cloud.leagueCode]);

  // Viewer → subscribe to Firestore
  useEffect(() => {
    if (!cloud.enabled || cloud.role !== 'viewer' || !cloud.leagueCode) return;
    const fb = getFirebase();
    if (!fb) return;
    const unsub = fb.db.collection('leagues').doc(cloud.leagueCode).onSnapshot(snap => {
      if (!snap.exists) return;
      const data = snap.data();
      if (!data || !data.state) return;
      try {
        const incoming = JSON.parse(data.state);
        setState(s => ({
          ...incoming,
          cloud: { ...s.cloud, lastSync: new Date().toISOString() },  // preserve viewer cloud meta
        }));
        hydratedRef.current = true;
      } catch (e) { console.warn('Cloud parse failed:', e); }
    }, err => console.warn('Cloud subscribe failed:', err));
    return () => unsub();
  }, [cloud.enabled, cloud.role, cloud.leagueCode]);
  // ===== END CLOUD SYNC =====

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => {
    if (!activeManager && state.managers.length > 0) setActiveManager(state.managers[0].id);
  }, [state.managers]);

  const update = (fn) => setState(prev => typeof fn === 'function' ? fn(prev) : fn);

  const tabs = [
    { id: 'home',      label: 'Home' },
    { id: 'setup',     label: 'Setup' },
    { id: 'wrestlers', label: 'Wrestlers' },
    { id: 'coaches',   label: 'Coaches' },
    { id: 'draft',     label: 'Draft' },
    { id: 'team',      label: 'Teams' },
    { id: 'matchup',   label: 'Matchups' },
    { id: 'standings', label: 'Standings' },
    { id: 'pickem',    label: "Pick'em" },
    { id: 'bracket',   label: 'NCAAs' },
    { id: 'money',     label: '💰 Money' },
  ];

  return (
    <div className="min-h-screen flex flex-col">
      <Header state={state} update={update} tab={tab} setTab={setTab} tabs={tabs} />
      <CloudStatusBanner state={state} />
      <RefreshBanner state={state} update={update} />
      <MondayUpdateBanner state={state} update={update} />
      <NewsTicker />
      <main className="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 py-6">
        {tab === 'home'      && <HomeTab state={state} setTab={setTab} />}
        {tab === 'setup'     && <SetupTab state={state} update={update} />}
        {tab === 'wrestlers' && <WrestlersTab state={state} update={update} />}
        {tab === 'coaches'   && <CoachesTab state={state} update={update} />}
        {tab === 'draft'     && <DraftTab state={state} update={update} />}
        {tab === 'team'      && <TeamsTab state={state} update={update} activeManager={activeManager} setActiveManager={setActiveManager} />}
        {tab === 'matchup'   && <MatchupTab state={state} update={update} />}
        {tab === 'standings' && <StandingsTab state={state} />}
        {tab === 'pickem'    && <PickemTab state={state} update={update} />}
        {tab === 'bracket'   && <BracketTab state={state} update={update} />}
        {tab === 'money'     && <MoneyTab state={state} update={update} />}
      </main>
      <Footer />
    </div>
  );
}

// ========== REFRESH BANNER (shows when wrestler/coach data is stale) ==========
function RefreshBanner({ state, update }) {
  const [dismissed, setDismissed] = useState(false);
  const stale = state.dataVersion !== DATA_VERSION;
  if (!stale || dismissed) return null;

  const refreshRosters = () => {
    if (!confirm(
      'Refresh wrestler & coach data to the latest version?\n\n' +
      'This pulls fresh names (removes graduates, adds transfers) from the current rankings.\n\n' +
      'Your drafts, picks, money, manager teams, and league settings are kept as-is. ' +
      'Drafted wrestlers/coaches that no longer exist will be marked so you can replace them in Free Agency.'
    )) return;

    update(s => {
      // Build lookup of currently drafted IDs so we don't orphan rosters
      const draftedW = new Set(Object.values(s.rosters || {}).flat());
      const draftedC = new Set(Object.values(s.coachRosters || {}).flat());
      const keepW = (s.wrestlers || []).filter(w => draftedW.has(w.id));
      const keepC = (s.coaches || []).filter(c => draftedC.has(c.id));

      // Avoid id collisions when merging starter pool with kept legacy entries
      const usedIds = new Set([...keepW.map(w => w.id), ...keepC.map(c => c.id)]);
      const reIdW = [...STARTER_WRESTLERS, ...STARTER_WATCHLIST_2027].map(w => {
        let id = w.id;
        while (usedIds.has(id)) id = id + '_';
        usedIds.add(id);
        return { ...w, id };
      });
      const reIdC = STARTER_COACHES.map(c => {
        let id = c.id;
        while (usedIds.has(id)) id = id + '_';
        usedIds.add(id);
        return { ...c, id };
      });

      return {
        ...s,
        wrestlers: [...keepW.map(w => ({ ...w, legacy: true })), ...reIdW],
        coaches:   [...keepC.map(c => ({ ...c, legacy: true })), ...reIdC],
        dataVersion: DATA_VERSION,
        league: { ...s.league, lastDataRefresh: new Date().toISOString().slice(0, 10) },
      };
    });
  };

  return (
    <div className="border-b border-zinc-800" style={{ background: 'linear-gradient(to right, rgba(225,29,72,0.15), rgba(251,191,36,0.10))' }}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-2.5 flex flex-wrap items-center justify-between gap-2">
        <div className="text-xs sm:text-sm flex items-center gap-2">
          <span className="pill pill-red text-[10px] uppercase">New data</span>
          <span className="text-zinc-200">
            Updated rankings &amp; rosters are available. Click <span className="text-[var(--gold)] font-semibold">Refresh</span> to pull in current wrestlers + coaches (keeps your draft &amp; league intact).
          </span>
        </div>
        <div className="flex gap-2">
          <button onClick={refreshRosters} className="primary text-xs py-1 px-3">↻ Refresh Rosters</button>
          <button onClick={() => setDismissed(true)} className="ghost text-xs">Later</button>
        </div>
      </div>
    </div>
  );
}

// ========== DATA FRESHNESS INDICATOR ==========
// Shows "Data: refreshed Xd ago" pill in the hero. Color-codes by staleness.
function DataFreshnessPill({ state }) {
  const last = state.league.lastDataRefresh;
  if (!last) return <span className="pill" style={{ background: '#52525b', color: '#fff' }}>DATA: NEVER REFRESHED</span>;

  const today = new Date();
  const lastDate = new Date(last + 'T00:00:00');
  const days = Math.floor((today - lastDate) / 86400000);
  const isMonday = today.getDay() === 1;

  let bg, fg, label;
  if (days <= 2)       { bg = '#16a34a'; fg = '#fff'; label = `DATA · ${days === 0 ? 'TODAY' : days + 'd ago'}`; }
  else if (days <= 6)  { bg = '#0ea5e9'; fg = '#fff'; label = `DATA · ${days}d ago`; }
  else if (days <= 13) { bg = '#f59e0b'; fg = '#000'; label = `DATA · ${days}d STALE`; }
  else                 { bg = '#dc2626'; fg = '#fff'; label = `DATA · ${days}d STALE!`; }

  return (
    <span className="pill" style={{ background: bg, color: fg }} title={`Last refreshed ${last}${isMonday && days >= 6 ? ' · Monday — ping Will to update!' : ''}`}>
      {label}{isMonday && days >= 6 ? ' · MON 📅' : ''}
    </span>
  );
}

  const [dismissed, setDismissed] = useState(false);

  const todayStr = today.toISOString().slice(0, 10);

  // Show when: it's Monday AND data is 6+ days old (one full cycle has passed)

  const markUpdated = () => {
    update(s => ({ ...s, league: { ...s.league, lastDataRefresh: todayStr } }));

      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex flex-wrap items-center justify-between gap-3">

          <div className="flex items-center gap-2 flex-wrap">

            <span className="text-sm font-bold text-zinc-100">{days}d since last refresh</span>
          </div>
          <div className="text-xs sm:text-sm text-zinc-300 mt-1">

// ========== LEAGUE ACTIVITY FEED (ESPN-style) ==========
function LeagueActivity({ state }) {
  const items = useMemo(() => {
    const events = [];
    const managerById = Object.fromEntries((state.managers || []).map(m => [m.id, m]));
    const wrestlerById = Object.fromEntries((state.wrestlers || []).map(w => [w.id, w]));

    // Free agency moves and trades
    (state.transactions || []).forEach(t => {
      const mgr = managerById[t.managerId];
      if (!mgr) return;
      // Trade event
      if (t.kind === 'trade') {
        const partner = managerById[t.partnerId];
        const pool = t.assetType === 'coach' ? state.coaches : state.wrestlers;
        const byId = Object.fromEntries(pool.map(p => [p.id, p]));
        const given = (t.giveIds || []).map(id => byId[id]).filter(Boolean);
        const got   = (t.getIds  || []).map(id => byId[id]).filter(Boolean);
        events.push({
          kind: 'trade',
          ts: t.timestamp || 0,
          week: t.week,
          manager: mgr,
          text: <>traded <span className="text-rose-400">{given.map(g => g.name).join(', ') || '?'}</span> to <span className="font-semibold">{partner ? displayName(partner) : '?'}</span> for <span className="text-green-400">{got.map(g => g.name).join(', ') || '?'}</span></>,
        });
        return;
      }
      // Standard free agency
      const cut = wrestlerById[t.cutId];
      const add = wrestlerById[t.addId];
      events.push({
        kind: 'fa',
        ts: t.timestamp || 0,
        week: t.week,
        manager: mgr,
        text: <>added <span className="text-green-400 font-semibold">{add?.name || 'unknown'}</span>{add ? ` (${add.weight})` : ''}, cut <span className="text-rose-400">{cut?.name || 'unknown'}</span></>,
      });
    });
    // Settled pickem duals
    (state.pickems || []).filter(p => p.winner).forEach(p => {
      events.push({
        kind: 'dual',
        ts: 0,
        week: p.week,
        text: <><span className="font-semibold">{p.winner === 'A' ? p.teamA : p.teamB}</span> def. {p.winner === 'A' ? p.teamB : p.teamA}{p.label ? ` · ${p.label}` : ''}</>,
      });
    });
    // Recent draft picks (latest 5)
    if (state.draft?.picks?.length) {
      state.draft.picks.slice(-5).reverse().forEach((p, i) => {
        const mgr = managerById[p.managerId];
        const w = wrestlerById[p.wrestlerId];
        if (!mgr || !w) return;
        events.push({
          kind: 'draft',
          ts: 1_000_000 - i,  // sort to top
          text: <>{mgr ? <span className="font-semibold">{displayName(mgr)}</span> : 'Someone'} drafted <span className="text-[var(--gold)]">{w.name}</span> <span className="text-zinc-500">({w.weight} · {w.school})</span></>,
          manager: mgr,
        });
      });
    }

    // Sort by ts descending (newest first), cap at 8
    return events.sort((a, b) => (b.ts || 0) - (a.ts || 0)).slice(0, 8);
  }, [state]);

  if (items.length === 0) {
    return (
      <div className="card rounded-lg p-6">
        <h3 className="display text-2xl mb-3">League Activity</h3>
        <p className="text-zinc-500 text-sm">No activity yet — once the draft starts, picks, trades, and dual results will show up here.</p>
      </div>
    );
  }
  return (
    <div className="card rounded-lg p-6">
      <div className="flex items-center justify-between mb-3">
        <h3 className="display text-2xl">League Activity</h3>
        <span className="text-[10px] text-zinc-500 uppercase tracking-wider">Latest {items.length}</span>
      </div>
      <div className="space-y-2">
        {items.map((e, i) => (
          <div key={i} className="card-2 rounded p-2.5 flex items-start gap-2.5 text-sm">
            <span className={`pill text-[10px] uppercase tracking-wider flex-shrink-0 mt-0.5 ${
              e.kind === 'fa' ? 'pill-gold' : e.kind === 'dual' ? 'pill-green' : e.kind === 'trade' ? 'pill-red' : 'pill-red'
            }`}>
              {e.kind === 'fa' ? 'FA' : e.kind === 'dual' ? 'Dual' : e.kind === 'trade' ? 'Trade' : 'Draft'}
            </span>
            {e.manager && <TeamBadge manager={e.manager} size="xs" />}
            <div className="flex-1">
              <div>{e.text}</div>
              {e.week && <div className="text-[10px] text-zinc-500 mt-0.5">Week {e.week}</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ========== CLOUD SYNC CARD (Setup tab) ==========
function CloudSyncCard({ state, update }) {
  const cloud = state.cloud || { enabled: false, leagueCode: null, role: 'commissioner', lastSync: null };
  const [joinCode, setJoinCode] = useState('');
  const fbAvailable = typeof firebase !== 'undefined';

  const startLeague = () => {
    if (!fbAvailable) { alert('Cloud sync unavailable — check your internet connection.'); return; }
    const code = generateLeagueCode();
    if (!confirm(`Create a new online league with code ${code}?\n\nYour current league data will be uploaded as the master copy. Share the code with your dad and friends so they can join as viewers.`)) return;
    update(s => ({ ...s, cloud: { enabled: true, leagueCode: code, role: 'commissioner', lastSync: null } }));
  };

  const joinLeague = () => {
    const code = joinCode.trim().toUpperCase();
    if (code.length !== 6) { alert('League code is 6 characters.'); return; }
    if (!confirm(`Join league ${code} as a VIEWER?\n\nYour current local data will be REPLACED with the commissioner's data once you connect. Only the commissioner can make changes; viewers see live updates.`)) return;
    update(s => ({ ...s, cloud: { enabled: true, leagueCode: code, role: 'viewer', lastSync: null } }));
  };

  const disconnect = () => {
    if (!confirm('Disconnect from cloud? Your local copy will keep all current data, but you\'ll no longer sync.')) return;
    update(s => ({ ...s, cloud: { enabled: false, leagueCode: null, role: 'commissioner', lastSync: null } }));
  };

  const copyCode = () => {
    if (!cloud.leagueCode) return;
    try { navigator.clipboard.writeText(cloud.leagueCode); alert(`Copied: ${cloud.leagueCode}\n\nText this to anyone you want to join the league.`); }
    catch (e) { alert(`Code: ${cloud.leagueCode}\n\n(Couldn't auto-copy — manually share this code.)`); }
  };

  const lastSyncDisplay = cloud.lastSync ? new Date(cloud.lastSync).toLocaleTimeString() : '—';

  return (
    <div className="card rounded-lg p-6 space-y-4" style={{ borderColor: cloud.enabled ? '#16a34a' : undefined, borderWidth: cloud.enabled ? 2 : undefined }}>
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h3 className="display text-2xl">🌐 Online League</h3>
        {cloud.enabled && (
          <span className="pill" style={{ background: cloud.role === 'commissioner' ? '#dc2626' : '#0ea5e9', color: '#fff' }}>
            {cloud.role === 'commissioner' ? '👑 COMMISSIONER' : '👀 VIEWER'}
          </span>
        )}
      </div>

      {!cloud.enabled ? (
        <>
          <p className="text-sm text-zinc-400">
            Run an online league with your dad and friends. <span className="font-bold text-zinc-200">Commissioner</span> drives the draft and scoring; <span className="font-bold text-zinc-200">viewers</span> watch live on their phones/computers.
          </p>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
            <div className="card-2 rounded p-4 space-y-2">
              <div className="font-bold text-[var(--gold)]">👑 Start a new league</div>
              <div className="text-xs text-zinc-400">You become commissioner. Your current data uploads to the cloud. Get a code to share with everyone.</div>
              <button onClick={startLeague} className="primary w-full" disabled={!fbAvailable}>Start Online League</button>
            </div>
            <div className="card-2 rounded p-4 space-y-2">
              <div className="font-bold text-sky-300">👀 Join an existing league</div>
              <div className="text-xs text-zinc-400">Got a code from someone? Paste it here. You'll see their league live.</div>
              <input
                value={joinCode}
                onChange={e => setJoinCode(e.target.value.toUpperCase())}
                placeholder="ABC123"
                maxLength={6}
                className="w-full mono text-center text-lg tracking-widest"
              />
              <button onClick={joinLeague} className="secondary w-full" disabled={!fbAvailable || joinCode.length !== 6}>Join as Viewer</button>
            </div>
          </div>
          {!fbAvailable && <div className="text-xs text-rose-300 mt-2">⚠ Cloud SDK not loaded — check your internet.</div>}
        </>
      ) : (
        <>
          <div className="card-2 rounded p-4 space-y-3">
            <div className="flex items-center justify-between gap-2 flex-wrap">
              <div>
                <div className="text-xs text-zinc-500 uppercase">League Code</div>
                <div className="display text-4xl mono tracking-widest text-[var(--gold)]">{cloud.leagueCode}</div>
              </div>
              {cloud.role === 'commissioner' && (
                <button onClick={copyCode} className="primary">📋 Copy & Share</button>
              )}
            </div>
            <div className="text-xs text-zinc-400 flex flex-wrap gap-x-4 gap-y-1">
              <span>Last sync: <span className="mono text-zinc-300">{lastSyncDisplay}</span></span>
              <span>Role: <span className="font-bold text-zinc-300">{cloud.role}</span></span>
            </div>
            {cloud.role === 'commissioner' ? (
              <div className="text-xs text-emerald-300">✓ Every change you make uploads to the cloud automatically. Viewers see it live.</div>
            ) : (
              <div className="text-xs text-sky-300">👀 You're watching live. Only the commissioner can make changes. Your edits won't persist.</div>
            )}
          </div>
          <button onClick={disconnect} className="ghost text-sm">Disconnect from cloud</button>
        </>
      )}
    </div>
  );
}

// ========== SETUP TAB ==========
function SetupTab({ state, update }) {
  const [newName, setNewName] = useState('');
  const season = getSeasonStatus(state.league);

  const addManager = () => {
    if (!newName.trim()) return;
    if (state.draft.started) { alert("Can't add managers after draft has started."); return; }
    const color = MANAGER_COLORS[state.managers.length % MANAGER_COLORS.length];
    const teamLogo = DEFAULT_LOGOS[state.managers.length % DEFAULT_LOGOS.length];
    update(s => ({ ...s, managers: [...s.managers, { id: uid(), name: newName.trim(), color, paid: false, teamName: '', teamLogo }] }));
    setNewName('');
  };
  const removeManager = (id) => {
    if (state.draft.started) { alert("Can't remove managers after draft has started."); return; }
    update(s => ({ ...s, managers: s.managers.filter(m => m.id !== id) }));
  };
  const updateLeague = (field, val) => {
    update(s => ({ ...s, league: { ...s.league, [field]: val } }));
  };

  const resetAll = () => {
    if (!confirm('Reset everything? Wipes league, draft, rosters, scores, pick\'em, NCAA wins. Cannot be undone.')) return;
    update({ ...DEFAULT_STATE });
  };
  const resetDraftOnly = () => {
    if (!confirm('Reset the draft? Clears wrestler + coach picks, keeps managers.')) return;
    update(s => ({
      ...s,
      draft: { order: [], picks: [], currentPickIndex: 0, isComplete: false, started: false },
      coachDraft: { order: [], picks: [], currentPickIndex: 0, isComplete: false, started: false },
      rosters: {},
      coachRosters: {},
    }));
  };

  return (
    <div className="space-y-6">
      <h2 className="display text-4xl">League Setup</h2>

      {/* CLOUD SYNC — share with dad + friends */}
      <CloudSyncCard state={state} update={update} />

          <div>
            <label className="text-xs text-zinc-400 block mb-1">League Name</label>
            <input value={state.league.name} onChange={e => updateLeague('name', e.target.value)} className="w-full" />
          </div>
          <div>
            <label className="text-xs text-zinc-400 block mb-1">Season Label</label>
            <input value={state.league.season} onChange={e => updateLeague('season', e.target.value)} className="w-full" />
          </div>
        </div>
      </div>

      {/* Season dates / auto week */}
      <div className="card rounded-lg p-6 space-y-4">
        <h3 className="display text-2xl">Season Dates & Week</h3>
        <p className="text-xs text-zinc-400">
          When auto-week is on, the current week updates automatically based on today's date.
          Default: first Monday of November → after NCAAs.
        </p>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <div>

            <input type="date" value={state.league.seasonStart} onChange={e => updateLeague('seasonStart', e.target.value)} className="w-full" />
          </div>

            <label className="text-xs text-zinc-400 block mb-1">Season End</label>

            if (!confirm('Refresh wrestler + coach pools to current rankings? Keeps your managers, drafts, and money. Replaces wrestlers/coaches lists.')) return;
            update(s => ({ ...s, wrestlers: [...STARTER_WRESTLERS, ...STARTER_WATCHLIST_2027], coaches: STARTER_COACHES }));
          }} className="secondary">🔄 Refresh Wrestlers + Coaches to Current Rankings</button>
          <button onClick={resetDraftOnly} className="secondary">Reset Drafts Only</button>
          <button onClick={resetAll} className="secondary" style={{ background: 'var(--red-deep)', color: 'white' }}>Reset Entire League</button>
        </div>
      </div>
    </div>
  );
}

function ManagerRow({ manager, index, update, onRemove, draftStarted }) {
  const [expanded, setExpanded] = useState(false);
  const fileRef = useRef(null);

  const setField = (field, val) => {
    update(s => ({ ...s, managers: s.managers.map(m => m.id === manager.id ? { ...m, [field]: val } : m) }));
  };
  const uploadLogo = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 500 * 1024) { alert('Logo too large. Keep under 500KB or use an emoji.'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => setField('teamLogo', ev.target.result);
    reader.readAsDataURL(file);
  };
  const clearLogo = () => setField('teamLogo', DEFAULT_LOGOS[index % DEFAULT_LOGOS.length]);
  const setColor = (c) => setField('color', c);

  return (
    <div className="card-2 rounded">
      <div className="p-3 flex items-center justify-between gap-3">
        <div className="flex items-center gap-3 min-w-0">
          <span className="text-zinc-500 mono text-sm w-5">{index + 1}.</span>
          <TeamBadge manager={manager} size="md" />
          <div className="min-w-0">
            <div className="font-semibold truncate">{displayName(manager)}</div>
            {manager.teamName && <div className="text-xs text-zinc-500 truncate">Manager: {manager.name}</div>}
          </div>
        </div>
        <div className="flex gap-2 flex-shrink-0">
          <button onClick={() => setExpanded(!expanded)} className="ghost text-sm">{expanded ? 'Done' : 'Edit'}</button>
          <button onClick={onRemove} className="ghost text-sm text-rose-400" disabled={draftStarted}>Remove</button>
        </div>
      </div>
      {expanded && (
        <div className="px-3 pb-3 pt-1 border-t border-zinc-800 space-y-3">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <div>
              <label className="text-xs text-zinc-400 block mb-1">Manager (person)</label>
              <input value={manager.name} onChange={e => setField('name', e.target.value)} className="w-full text-sm" />
            </div>
            <div>
              <label className="text-xs text-zinc-400 block mb-1">Team Name</label>
              <input value={manager.teamName || ''} onChange={e => setField('teamName', e.target.value)}
                placeholder="e.g. Mat Daddies, The Anvils" className="w-full text-sm" />
            </div>
          </div>
          <div>
            <label className="text-xs text-zinc-400 block mb-1">Team Logo — pick a static emoji, an animated one, or upload an image</label>
            <div className="text-[10px] text-zinc-500 uppercase tracking-wider mb-1 mt-1">Static</div>
            <div className="flex flex-wrap gap-1 mb-2">
              {LOGO_PICKER.map(e => (
                <button key={e} onClick={() => setField('teamLogo', e)}
                  className={`w-8 h-8 rounded flex items-center justify-center text-lg transition ${manager.teamLogo === e ? 'ring-2 ring-[var(--red)] bg-[var(--panel)]' : 'card hover:bg-[var(--panel)]'}`}>{e}</button>
              ))}
            </div>
            <div className="text-[10px] text-[var(--gold)] uppercase tracking-wider mb-1 mt-2 font-semibold">✨ Animated</div>
            <div className="flex flex-wrap gap-1 mb-2">
              {ANIMATED_LOGOS.map(a => {
                const val = `anim:${a.id}`;
                const selected = manager.teamLogo === val;
                return (
                  <button key={a.id} onClick={() => setField('teamLogo', val)} title={a.label}
                    className={`w-9 h-9 rounded flex items-center justify-center text-lg transition ${selected ? 'ring-2 ring-[var(--gold)] bg-[var(--panel)]' : 'card hover:bg-[var(--panel)]'}`}>
                    <span className={`animlogo ${a.anim}`}>{a.emoji}</span>
                  </button>
                );
              })}
            </div>
            <div className="flex gap-2 items-center">
              <input ref={fileRef} type="file" accept="image/*" onChange={uploadLogo} style={{ display: 'none' }} />
              <button onClick={() => fileRef.current?.click()} className="secondary text-xs">📷 Upload Image</button>
              <button onClick={clearLogo} className="ghost text-xs">Reset to emoji</button>
            </div>
          </div>
          <div>
            <label className="text-xs text-zinc-400 block mb-1">Team Color</label>
            <div className="flex flex-wrap gap-1">
              {MANAGER_COLORS.map(c => (
                <button key={c} onClick={() => setColor(c)}
                  className={`w-7 h-7 rounded transition ${manager.color === c ? 'ring-2 ring-white' : ''}`}
                  style={{ background: c }} />
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ========== WRESTLER PROFILE CARD (ESPN-style player page) ==========
function WrestlerProfileCard({ wrestler, state, update, onClose }) {
  // Helper to update a single field on this wrestler
  const setField = (field, val) => {
    update(s => ({ ...s, wrestlers: s.wrestlers.map(w => w.id === wrestler.id ? { ...w, [field]: val } : w) }));
  };

  // Bio lookup — pre-populated for marquee wrestlers; user edits override
  const explicitBio = WRESTLER_BIOS[`${wrestler.name}|${wrestler.school}`];

  // Fallback bio — generated from known wrestler data, zero fabrication.
  // Used when no hand-written bio exists. Honest, not flashy.
  const generateFallbackBio = (w) => {
    const yearLabel = {
      'FR': 'freshman', 'SO': 'sophomore', 'JR': 'junior',
      'SR': 'senior', '5Y': 'fifth-year senior', 'GR': 'graduate student',
      'HS': '2027 HS commit',
    }[w.year] || '';
    const conferenceMap = {
      'Penn State': 'Big Ten', 'Iowa': 'Big Ten', 'Ohio State': 'Big Ten', 'Michigan': 'Big Ten',
      'Minnesota': 'Big Ten', 'Nebraska': 'Big Ten', 'Wisconsin': 'Big Ten', 'Illinois': 'Big Ten',
      'Indiana': 'Big Ten', 'Purdue': 'Big Ten', 'Northwestern': 'Big Ten', 'Maryland': 'Big Ten',
      'Rutgers': 'Big Ten', 'Michigan State': 'Big Ten',
      'Oklahoma State': 'Big 12', 'Iowa State': 'Big 12', 'Oklahoma': 'Big 12', 'Missouri': 'Big 12',
      'West Virginia': 'Big 12', 'Wyoming': 'Big 12', 'Air Force': 'Big 12', 'Utah Valley': 'Big 12',
      'Northern Colorado': 'Big 12', 'Northern Iowa': 'Big 12', 'North Dakota State': 'Big 12',
      'South Dakota State': 'Big 12', 'Cal Baptist': 'Big 12', 'Arizona State': 'Big 12',
      'Stanford': 'ACC', 'NC State': 'ACC', 'North Carolina': 'ACC', 'Virginia Tech': 'ACC',
      'Pittsburgh': 'ACC', 'Virginia': 'ACC', 'Duke': 'ACC', 'Cal': 'ACC',
      'Cornell': 'EIWA', 'Lehigh': 'EIWA', 'Princeton': 'EIWA', 'Pennsylvania': 'EIWA',
      'Columbia': 'EIWA', 'Harvard': 'EIWA', 'Brown': 'EIWA', 'Hofstra': 'EIWA',
      'Navy': 'EIWA', 'Army West Point': 'EIWA', 'American': 'EIWA', 'Drexel': 'EIWA',
      'Binghamton': 'EIWA', 'Bucknell': 'EIWA', 'Franklin & Marshall': 'EIWA', 'George Mason': 'EIWA',
      'Sacred Heart': 'EIWA', 'Rider': 'EIWA', 'LIU': 'EIWA', 'Bloomsburg': 'EIWA',
      'Edinboro': 'EIWA', 'Long Island': 'EIWA',
      'Buffalo': 'MAC', 'Central Michigan': 'MAC', 'Kent State': 'MAC', 'Northern Illinois': 'MAC',
      'Ohio': 'MAC', 'SIU Edwardsville': 'MAC', 'Lock Haven': 'MAC', 'Clarion': 'MAC',
      'Bellarmine': 'SoCon', 'Campbell': 'SoCon', 'Chattanooga': 'SoCon', 'Gardner-Webb': 'SoCon',
      'Davidson': 'SoCon', 'Presbyterian': 'SoCon', 'The Citadel': 'SoCon', 'VMI': 'SoCon',
      'Appalachian State': 'SoCon', 'Little Rock': 'Pac-12',
      'CSU Bakersfield': 'Pac-12', 'Cal State Bakersfield': 'Pac-12', 'Oregon State': 'Pac-12',
      'Morgan State': 'ECWC',
    };
    const conference = conferenceMap[w.school] || '';
    const transferNote = (w.transferHistory && w.transferHistory.length > 0)
      ? ` Transfer from ${w.transferHistory[w.transferHistory.length - 1]}.`
      : '';
    const legacyNote = w.legacy ? ' (Legacy entry — verify current roster status.)' : '';
    const watchlistNote = w.watchlist ? ' Class of 2027 HS junior commit — eligible for future draft once enrolled.' : '';

    if (w.watchlist) {
      return {
        notes: `2027 recruiting class commit to ${w.school}. Projected at ${w.weight} lbs.${watchlistNote}`,
      };
    }
    return {
      notes: `${w.school} ${yearLabel || 'wrestler'} at ${w.weight} lbs${conference ? ` (${conference})` : ''}.${transferNote}${legacyNote}`,
    };
  };

  const bio = explicitBio || generateFallbackBio(wrestler);

  // Defaults — fall back to bio defaults, then empty values
  const photo           = wrestler.photo || '';
  const year            = wrestler.year || '';   // FR / SO / JR / SR
  const record          = wrestler.record       || bio.record       || { w: 0, l: 0 };
  const careerRecord    = wrestler.careerRecord || bio.careerRecord || { w: 0, l: 0 };
  const bigWins         = wrestler.bigWins      || bio.bigWins      || [];
  const history         = wrestler.history      || bio.history      || [];
  const transferHistory = wrestler.transferHistory || bio.transferHistory || [];
  const notes           = wrestler.notes || bio.notes || '';

  // Find which manager (if any) drafted this wrestler
  const draftedBy = useMemo(() => {
    for (const [mgrId, ids] of Object.entries(state.rosters || {})) {
      if ((ids || []).includes(wrestler.id)) return state.managers.find(m => m.id === mgrId);
    }
    return null;
  }, [state.rosters, state.managers, wrestler.id]);

  // Upload a photo as data URL
  const onUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 500_000) { alert('Photo too large — keep under 500KB.'); return; }
    const reader = new FileReader();
    reader.onload = ev => setField('photo', ev.target.result);
    reader.readAsDataURL(file);

  // Big wins editing
  const addBigWin = () => setField('bigWins', [...bigWins, '']);
  const updateBigWin = (i, val) => setField('bigWins', bigWins.map((b, idx) => idx === i ? val : b));
  const removeBigWin = (i) => setField('bigWins', bigWins.filter((_, idx) => idx !== i));

  // Match history editing
  const addMatch = () => setField('history', [...history, { date: '', opponent: '', school: '', result: 'W', score: '' }]);
  const updateMatch = (i, field, val) => setField('history', history.map((m, idx) => idx === i ? { ...m, [field]: val } : m));
  const removeMatch = (i) => setField('history', history.filter((_, idx) => idx !== i));

  // Transfer / school history editing
  const addTransfer = () => setField('transferHistory', [...transferHistory, '']);
  const updateTransfer = (i, val) => setField('transferHistory', transferHistory.map((t, idx) => idx === i ? val : t));
  const removeTransfer = (i) => setField('transferHistory', transferHistory.filter((_, idx) => idx !== i));

  // Verified-source quick-link URLs — open the right destination per wrestler
  const photoSearchUrl  = `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(wrestler.name + ' ' + wrestler.school + ' wrestling')}`;
  const wrestleStatUrl  = `https://wrestlestat.azurewebsites.net/d1/wrestler/select?q=${encodeURIComponent(wrestler.name)}`;
  const schoolSiteUrl   = `https://www.google.com/search?q=${encodeURIComponent(wrestler.school + ' wrestling roster ' + wrestler.name)}`;
  const newsUrl         = `https://www.google.com/search?tbm=nws&q=${encodeURIComponent(wrestler.name + ' ' + wrestler.school + ' wrestling')}`;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
      <div className="card rounded-lg max-w-5xl w-full max-h-[90vh] overflow-y-auto scrollbar" onClick={e => e.stopPropagation()}>
        {/* HEADER STRIPE */}
        <div className="stripe p-6 relative">
          <button onClick={onClose} className="absolute top-3 right-3 text-zinc-400 hover:text-white text-2xl leading-none w-8 h-8 flex items-center justify-center">×</button>
          <div className="flex flex-wrap gap-5 items-start">
            {/* PHOTO */}
            <div className="flex-shrink-0">
              <div className="w-32 h-32 rounded-lg overflow-hidden flex items-center justify-center bg-[var(--panel-2)]" style={{ boxShadow: '0 0 24px rgba(225,29,72,0.25)' }}>
                {photo ? (
                  <img src={photo} alt={wrestler.name} className="w-full h-full object-cover"
                       onError={(e) => { e.target.style.display = 'none'; }} />
                ) : (
                  <WrestlerAvatar wrestler={wrestler} size="xl" />
                )}
              </div>
              <div className="mt-2 flex flex-col gap-1">
                <label className="ghost text-xs text-center cursor-pointer">
                  📷 Upload Photo
                  <input type="file" accept="image/*" onChange={onUpload} className="hidden" />
                </label>
                <a href={photoSearchUrl} target="_blank" rel="noopener noreferrer" className="ghost text-xs text-center" style={{ textDecoration: 'none' }}>
                  🔍 Find Photo
                </a>
                {photo && <button onClick={() => setField('photo', '')} className="ghost text-xs text-rose-400">Remove</button>}
              </div>
            </div>

            {/* IDENTITY */}
            <div className="flex-1 min-w-[250px]">
              <div className="flex flex-wrap gap-2 mb-2">
                <span className="pill pill-red">#{wrestler.rank} at {wrestler.weight}</span>
                {draftedBy && <span className="pill pill-gold">Drafted by {displayName(draftedBy)}</span>}
                {wrestler.legacy && <span className="pill pill-gray">Legacy</span>}
              </div>
              <h2 className="display text-4xl leading-tight">{wrestler.name}</h2>
              <div className="text-zinc-300 mt-1">{wrestler.school}</div>
              <div className="flex items-center gap-3 mt-3">
                <label className="text-xs uppercase text-zinc-500 tracking-wider">Year</label>
                <select value={year} onChange={e => setField('year', e.target.value)} className="card-2 text-sm py-1 px-2">
                  <option value="">—</option>
                  <option value="FR">FR</option>
                  <option value="SO">SO</option>
                  <option value="JR">JR</option>
                  <option value="SR">SR</option>
                  <option value="GR">GR (grad year)</option>
                  <option value="5Y">5Y (5th year)</option>
                </select>
              </div>
              <div className="mt-3">
                <label className="text-xs uppercase text-zinc-500 tracking-wider block mb-1">Photo URL (optional)</label>
                <input type="text" value={photo.startsWith('data:') ? '' : photo} placeholder="paste photo URL from gopack.com, hawkeyesports.com, etc."
                       onChange={e => setField('photo', e.target.value)} className="w-full text-xs" />
              </div>
            </div>

            {/* RECORDS BIG NUMBERS */}
            <div className="flex flex-col gap-3">
              <LiveRecordBox wrestlerId={wrestler.id} state={state} />
              <RecordBox label="Career" record={careerRecord} onChange={r => setField('careerRecord', r)} small />

          </div>
        </div>

        {/* BODY */}
        <div className="p-6 grid md:grid-cols-2 gap-6">
          {/* BIG WINS */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <h3 className="display text-2xl">🏆 Big Wins</h3>
              <button onClick={addBigWin} className="ghost text-xs">+ Add</button>
            </div>
            {bigWins.length === 0 && <div className="text-zinc-500 text-sm italic">No big wins logged yet. Add a notable victory.</div>}
            <div className="space-y-1.5">
              {bigWins.map((bw, i) => (
                <div key={i} className="flex gap-2 items-center">
                  <span className="text-[var(--gold)] mono text-xs">{i + 1}.</span>
                  <input value={bw} onChange={e => updateBigWin(i, e.target.value)}
                         placeholder='e.g. def. Mendez 5-3 NCAA semi'
                         className="flex-1 text-sm" />
                  <button onClick={() => removeBigWin(i)} className="ghost text-xs text-rose-400">×</button>
                </div>
              ))}
            </div>
          </div>

          {/* MATCH HISTORY — auto from weekly results, plus manual additions */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <h3 className="display text-2xl">📋 Match Log</h3>
              <button onClick={addMatch} className="ghost text-xs">+ Add manual</button>

              <>

                        <option value="L">L</option>
                      </select>
                      <input value={m.opponent} onChange={e => updateMatch(i, 'opponent', e.target.value)} placeholder="Opponent" className="col-span-4 text-xs" />
                      <input value={m.score} onChange={e => updateMatch(i, 'score', e.target.value)} placeholder="Score" className="col-span-3 text-xs" />
                      <button onClick={() => removeMatch(i)} className="ghost text-xs text-rose-400 col-span-1">×</button>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>

          {/* SCHOOL HISTORY / TRANSFERS */}
          <div className="md:col-span-2">
            <div className="flex items-center justify-between mb-2">
              <h3 className="display text-2xl">🏫 School History</h3>
              <button onClick={addTransfer} className="ghost text-xs">+ Add</button>
            </div>
            {transferHistory.length === 0 && (
              <div className="text-zinc-500 text-sm italic">
                No prior schools logged. Add transfers, redshirt schools, JC stops, etc. — or use the buttons above to look it up.
              </div>
            )}
            <div className="space-y-1.5">
              {transferHistory.map((t, i) => (
                <div key={i} className="flex gap-2 items-center">
                  <span className="text-[var(--gold)] mono text-xs flex-shrink-0">←</span>
                  <input value={t} onChange={e => updateTransfer(i, e.target.value)}
                         placeholder='e.g. "Stanford (2022-24)" or "Ohio State (2023-25, redshirt)"'
                         className="flex-1 text-sm" />
                  <button onClick={() => removeTransfer(i)} className="ghost text-xs text-rose-400">×</button>
                </div>
              ))}
            </div>
          </div>

          {/* NOTES */}
          <div className="md:col-span-2">
            <h3 className="display text-2xl mb-2">📝 Notes</h3>
            <textarea value={notes} onChange={e => setField('notes', e.target.value)}
                      placeholder="Scouting notes, injury report, weight cut info..."
                      className="w-full text-sm" rows="3" />
          </div>
        </div>

        <div className="p-4 border-t border-zinc-800 flex flex-wrap justify-between items-center gap-3">
          {/* Quick-link bar — verified data sources for THIS wrestler */}
          <div className="flex flex-wrap gap-2">
            <a href={wrestleStatUrl} target="_blank" rel="noopener noreferrer" className="ghost text-xs" style={{ textDecoration: 'none' }} title="Search WrestleStat for career stats & match history">
              🏆 WrestleStat
            </a>
            <a href={schoolSiteUrl} target="_blank" rel="noopener noreferrer" className="ghost text-xs" style={{ textDecoration: 'none' }} title="Find the school's wrestling bio page">
              🏫 School Bio
            </a>
            <a href={newsUrl} target="_blank" rel="noopener noreferrer" className="ghost text-xs" style={{ textDecoration: 'none' }} title="Recent news mentions">
              📰 News
            </a>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-xs text-zinc-500">Auto-saved</span>
            <button onClick={onClose} className="primary">Done</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Small W-L editor used in the profile card header
function RecordBox({ label, record, onChange, small }) {

    <div className={`card-2 rounded ${small ? 'p-2' : 'p-3'} text-center`} style={{ minWidth: small ? '120px' : '140px' }}>
      <div className="text-[10px] uppercase tracking-wider text-zinc-500 mb-1">{label}</div>
      <div className="flex items-center justify-center gap-1">
        <input type="number" min="0" value={record.w} onChange={e => onChange({ ...record, w: parseInt(e.target.value || '0') })}
               className={`text-center mono ${small ? 'text-lg w-12 py-0.5' : 'text-2xl w-14 py-1'} font-bold text-green-400`} />
        <span className={`text-zinc-500 ${small ? 'text-sm' : 'text-xl'}`}>-</span>
        <input type="number" min="0" value={record.l} onChange={e => onChange({ ...record, l: parseInt(e.target.value || '0') })}
               className={`text-center mono ${small ? 'text-lg w-12 py-0.5' : 'text-2xl w-14 py-1'} font-bold text-rose-400`} />
