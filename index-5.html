}

// LIVE 2026-27 record — auto-computed from state.weeklyResults. Read-only by design;
// pin/tech/major/dec gets logged through the Matchup tab → record updates automatically.
function LiveRecordBox({ wrestlerId, state }) {
  const { w, l } = useMemo(() => getWrestlerLiveRecord(wrestlerId, state), [wrestlerId, state.weeklyResults]);
  const form = useMemo(() => getWrestlerForm(wrestlerId, state, 5), [wrestlerId, state.weeklyResults]);
  const winPct = w + l > 0 ? Math.round((w / (w + l)) * 100) : null;
  return (
    <div className="card-2 rounded p-3 text-center" style={{ minWidth: '160px' }}>
      <div className="text-[10px] uppercase tracking-wider text-zinc-500 mb-1 flex items-center justify-center gap-1">
        <span className="inline-block w-1.5 h-1.5 bg-green-400 rounded-full pulse-red" style={{ animation: 'none' }} />
        2026-27 Live
      </div>
      <div className="flex items-center justify-center gap-1">
        <span className="mono text-2xl w-14 py-1 font-bold text-green-400 text-center">{w}</span>
        <span className="text-zinc-500 text-xl">-</span>
        <span className="mono text-2xl w-14 py-1 font-bold text-rose-400 text-center">{l}</span>
      </div>
      {winPct !== null && <div className="text-[10px] text-zinc-400 mono mt-0.5">{winPct}% win rate</div>}
      {form.length > 0 && (
        <div className="flex items-center justify-center gap-0.5 mt-2">
          <span className="text-[9px] uppercase text-zinc-600 mr-1">Form</span>
          {form.map((r, i) => (
            <span key={i} className={`inline-block w-4 h-4 rounded text-[9px] font-bold leading-4 ${r === 'W' ? 'bg-green-700 text-green-100' : 'bg-rose-800 text-rose-100'}`}>{r}</span>
          ))}
        </div>
      )}
      {w === 0 && l === 0 && <div className="text-[10px] text-zinc-600 mt-1 italic">No matches logged</div>}
    </div>
  );
}

// Auto-derived match log — pulls every result for the wrestler out of state.weeklyResults.
// Tied directly to the Matchup tab — log a pin there, it shows up here.
function LiveMatchLog({ wrestlerId, state }) {
  const live = useMemo(() => getWrestlerLiveHistory(wrestlerId, state), [wrestlerId, state.weeklyResults]);
  if (live.length === 0) {
    return (
      <div className="card-2 rounded p-2.5 text-xs text-zinc-500 italic">
        No in-season results yet. Log pins/techs/majors/decs in the <span className="text-[var(--gold)] not-italic font-semibold">Matchups</span> tab — they'll show up here automatically week-over-week.
      </div>
    );
  }
  return (
    <div>
      <div className="text-[10px] uppercase tracking-wider text-zinc-500 mb-1 flex items-center gap-1">
        <span className="inline-block w-1.5 h-1.5 bg-green-400 rounded-full" />
        Live · auto-tracked from weekly results
      </div>
      <div className="space-y-1 max-h-64 overflow-y-auto scrollbar">
        {live.map((m, i) => (
          <div key={i} className="card-2 rounded p-1.5 flex items-center gap-2 text-xs">
            <span className="mono text-zinc-500 w-12 flex-shrink-0">Wk {m.week}</span>
            <span className={`pill text-[9px] uppercase ${m.result === 'W' ? 'pill-green' : 'pill-red'}`}>{m.result}</span>
            <span className="flex-1 truncate">{m.label}</span>
            <span className={`mono text-xs font-semibold ${m.pts > 0 ? 'text-green-400' : 'text-rose-400'}`}>{m.pts > 0 ? '+' : ''}{m.pts}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Compact form bar — used in wrestler rows for quick at-a-glance trend
function FormBar({ wrestlerId, state, max = 5 }) {
  const form = useMemo(() => getWrestlerForm(wrestlerId, state, max), [wrestlerId, state.weeklyResults]);
  if (form.length === 0) return null;
  return (
    <span className="inline-flex gap-0.5 items-center">
      {form.map((r, i) => (
        <span key={i} className={`inline-block w-2.5 h-2.5 rounded-sm ${r === 'W' ? 'bg-green-500' : 'bg-rose-500'}`} title={r === 'W' ? 'Win' : 'Loss'} />
      ))}
    </span>
  );
}

// ========== WRESTLERS ==========
function WrestlersTab({ state, update }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [profileId, setProfileId] = useState(null);
  const [showBulkImport, setShowBulkImport] = useState(false);
  const [poolMode, setPoolMode] = useState('main'); // 'main' = 2026-27 pool, 'watchlist' = 2027 HS commits

  const profileWrestler = useMemo(
    () => state.wrestlers.find(w => w.id === profileId),
    [state.wrestlers, profileId]
  );

  const watchlistCount = useMemo(() => state.wrestlers.filter(w => w.watchlist).length, [state.wrestlers]);
  const mainCount = useMemo(() => state.wrestlers.filter(w => !w.watchlist).length, [state.wrestlers]);

  const filtered = useMemo(() => {
    if (filter === 'p4p' && poolMode === 'main') {
      // P4P mode: top 33 across all weights, sorted by P4P rank
      return state.wrestlers
        .filter(w => !w.watchlist)
        .filter(w => P4P_TOP_33_SET.has(`${w.name}|${w.school}`))
        .filter(w => !search || (w.name + w.school).toLowerCase().includes(search.toLowerCase()))
        .sort((a, b) => (P4P_RANK.get(`${a.name}|${a.school}`) || 999) - (P4P_RANK.get(`${b.name}|${b.school}`) || 999));
    }
    return state.wrestlers
      .filter(w => poolMode === 'watchlist' ? w.watchlist : !w.watchlist)
      .filter(w => filter === 'all' || w.weight === parseInt(filter))
      .filter(w => !search || (w.name + w.school).toLowerCase().includes(search.toLowerCase()))
      .sort((a, b) => a.weight - b.weight || a.rank - b.rank);
  }, [state.wrestlers, filter, search, poolMode]);

  const draftedIds = useMemo(() => {
    const set = new Set();
    Object.values(state.rosters).forEach(arr => (arr || []).forEach(id => set.add(id)));
    return set;
  }, [state.rosters]);

  const updateWrestler = (id, field, val) => {
    update(s => ({ ...s, wrestlers: s.wrestlers.map(w => w.id === id ? { ...w, [field]: val } : w) }));
  };
  const deleteWrestler = (id) => {
    if (draftedIds.has(id)) { alert('Cannot delete — already drafted.'); return; }
    update(s => ({ ...s, wrestlers: s.wrestlers.filter(w => w.id !== id) }));
  };
  const addWrestler = (data) => {
    const newId = `w${uid()}`;
    update(s => ({ ...s, wrestlers: [...s.wrestlers, { id: newId, ...data }] }));
    setShowAdd(false);
  };
  const moveUp = (id) => update(s => ({ ...s, wrestlers: moveRank(s.wrestlers, id, -1, 'weight') }));
  const moveDown = (id) => update(s => ({ ...s, wrestlers: moveRank(s.wrestlers, id, +1, 'weight') }));

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="display text-4xl">Wrestler Pool</h2>
          <p className="text-xs text-zinc-500 mt-1">
            Ranked top 33 per weight from <span className="text-[var(--gold)]">WrestleStat 2026-27 preseason</span> (released May 18, 2026). Reflects spring portal moves. Data version: <span className="mono">{state.dataVersion || '—'}</span> · Latest: <span className="mono">{DATA_VERSION}</span>
            {state.dataVersion !== DATA_VERSION && <span className="text-rose-400 font-semibold"> · ⚠ Refresh available — see top banner</span>}
          </p>
        </div>
        <div className="flex gap-2">
          <button onClick={() => setShowBulkImport(true)} className="ghost" title="Paste a school's roster — auto-parses names/weights">📋 Bulk Import</button>
          <button onClick={() => setShowAdd(true)} className="primary">+ Add Wrestler</button>
        </div>
      </div>

      <div className="card rounded-lg p-4 flex flex-wrap gap-3 items-center">
        <div className="flex gap-1">
          <button
            onClick={() => setPoolMode('main')}
            className={`px-3 py-1.5 rounded text-sm font-semibold ${poolMode === 'main' ? 'bg-[var(--gold)] text-zinc-900' : 'card-2'}`}
            title="2026-27 college roster pool (used for the draft)"
          >🤼 2026-27 Pool ({mainCount})</button>
          <button
            onClick={() => setPoolMode('watchlist')}
            className={`px-3 py-1.5 rounded text-sm font-semibold ${poolMode === 'watchlist' ? 'bg-cyan-500 text-white' : 'card-2'}`}
            title="Class of 2027 HS juniors committed to D1 programs — future stars only, NOT in draft pool"
          >👀 2027 Watchlist ({watchlistCount})</button>
        </div>
        <div className="w-px h-6 bg-zinc-700"></div>
        <div className="flex flex-wrap gap-1">
          <button onClick={() => setFilter('all')} className={`px-3 py-1.5 rounded text-sm font-semibold ${filter === 'all' ? 'bg-[var(--red)] text-white' : 'card-2'}`}>All</button>
          {poolMode === 'main' && (
            <button onClick={() => setFilter('p4p')}
              className={`px-3 py-1.5 rounded text-sm font-semibold ${filter === 'p4p' ? 'text-black' : 'card-2'}`}
              style={filter === 'p4p' ? { background: 'var(--gold)' } : {}}
              title="Top 33 wrestlers regardless of weight class">
              ⭐ Top 33 P4P
            </button>
          )}
          {WEIGHTS.map(w => (
            <button key={w} onClick={() => setFilter(String(w))} className={`px-3 py-1.5 rounded text-sm font-semibold mono ${filter === String(w) ? 'bg-[var(--red)] text-white' : 'card-2'}`}>{w}</button>
          ))}
        </div>
        <input placeholder="Search name or school..." value={search} onChange={e => setSearch(e.target.value)} className="flex-1 min-w-[200px]" />
      </div>

      {poolMode === 'watchlist' && (
        <div className="rounded-lg p-3 text-sm" style={{ background: 'rgba(6,182,212,0.10)', border: '1px solid rgba(6,182,212,0.4)' }}>
          <div className="font-semibold text-cyan-300 mb-1">👀 Class of 2027 Watchlist · Future Stars Only</div>
          <div className="text-xs text-zinc-400">
            These wrestlers are CURRENT high school juniors who have committed to D1 programs for the 2027-28 college season.
            They are <span className="text-cyan-300">NOT eligible for the 2026-27 draft</span> and won't appear in Free Agency.
            Source: FloWrestling 2027 Commitment List. The Big-Board top of the class is loaded with Melvin Miller (#1, VT — Bo Bassett's brother), Landon Sidun (#2, PSU), Joe Bachmann (#3, Iowa), Nicholas Singer (#4, OSU).
          </div>
        </div>
      )}

      <div className="card rounded-lg overflow-hidden">
        <div className="overflow-x-auto scrollbar max-h-[600px]">
          <table className="w-full text-sm">
            <thead className="bg-[var(--panel-2)] sticky top-0 z-10">
              <tr>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">WT</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">#</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400 w-20">Rank</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Name</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">School</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Record</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Form</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Status</th>
                <th className="px-3 py-3"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(w => {
                const weightGroup = state.wrestlers.filter(x => x.weight === w.weight).sort((a,b)=>a.rank-b.rank);
                const isFirst = w.rank === 1;
                const isLast = w.rank === weightGroup.length;
                const p4pRank = P4P_RANK.get(`${w.name}|${w.school}`);
                return (
                  <tr key={w.id} className="border-t border-zinc-800 hover:bg-[var(--panel-2)]">
                    <td className="px-3 py-2 mono font-bold">{w.weight}</td>
                    <td className="px-3 py-2 mono text-zinc-400">
                      {filter === 'p4p' && p4pRank ? (
                        <span className="px-1.5 py-0.5 rounded font-bold" style={{ background: 'var(--gold)', color: 'black' }}>⭐{p4pRank}</span>
                      ) : (
                        <>#{w.rank}</>
                      )}
                    </td>
                    <td className="px-3 py-2">
                      <div className="flex gap-1">
                        <button onClick={() => moveUp(w.id)} disabled={isFirst} className="rank-arrow" title="Move up">▲</button>
                        <button onClick={() => moveDown(w.id)} disabled={isLast} className="rank-arrow" title="Move down">▼</button>
                      </div>
                    </td>
                    <td className="px-3 py-2 font-semibold">
                      {editing === w.id
                        ? <input value={w.name} onChange={e => updateWrestler(w.id, 'name', e.target.value)} className="w-full" />
                        : <span className="flex items-center gap-2">
                            <WrestlerAvatar wrestler={w} size="sm" />
                            <button onClick={() => setProfileId(w.id)} className="text-left hover:text-[var(--gold)] underline decoration-zinc-700 underline-offset-2 hover:decoration-[var(--gold)] transition">
                              {w.name}
                            </button>
                            {w.year && <span className="pill pill-gray text-[9px] uppercase">{w.year}</span>}
                            {w.transferHistory && w.transferHistory.length > 0 && <span className="pill pill-gold text-[9px] uppercase" title={w.transferHistory.join(' → ')}>↔ xfer</span>}
                            {w.legacy && <span className="pill pill-gray text-[9px] uppercase" title="From a previous data version — may have graduated. Replace via Free Agency or delete.">legacy</span>}
                          </span>}
                    </td>
                    <td className="px-3 py-2 text-zinc-400">
                      {editing === w.id
                        ? <input value={w.school} onChange={e => updateWrestler(w.id, 'school', e.target.value)} className="w-full" />
                        : w.school}
                    </td>
                    <td className="px-3 py-2 whitespace-nowrap">
                      {(() => {
                        const lr = getWrestlerLiveRecord(w.id, state);
                        if (lr.w === 0 && lr.l === 0) return <span className="text-zinc-700 text-xs mono">—</span>;
                        return <span className="mono text-xs"><span className="text-green-400 font-bold">{lr.w}</span><span className="text-zinc-600">-</span><span className="text-rose-400 font-bold">{lr.l}</span></span>;
                      })()}
                    </td>
                    <td className="px-3 py-2"><FormBar wrestlerId={w.id} state={state} /></td>
                    <td className="px-3 py-2">
                      {draftedIds.has(w.id)
                        ? <span className="pill pill-gray">Drafted</span>
                        : <span className="pill pill-green">Available</span>}
                    </td>
                    <td className="px-3 py-2 text-right whitespace-nowrap">
                      {editing === w.id
                        ? <button onClick={() => setEditing(null)} className="primary text-xs py-1 px-2">Save</button>
                        : <>
                            <button onClick={() => setProfileId(w.id)} className="ghost text-xs text-[var(--gold)]" title="Open profile card">👁 Profile</button>
                            <button onClick={() => setEditing(w.id)} className="ghost text-xs">Edit</button>
                            <button onClick={() => deleteWrestler(w.id)} className="ghost text-xs text-rose-400">Del</button>
                          </>
                      }
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {showAdd && <AddWrestlerModal onAdd={addWrestler} onClose={() => setShowAdd(false)} existing={state.wrestlers} />}
      {showBulkImport && <BulkImportModal state={state} update={update} onClose={() => setShowBulkImport(false)} />}
      {profileWrestler && <WrestlerProfileCard wrestler={profileWrestler} state={state} update={update} onClose={() => setProfileId(null)} />}
    </div>
  );
}

function AddWrestlerModal({ onAdd, onClose, existing }) {
  const [name, setName] = useState('');
  const [school, setSchool] = useState('');
  const [weight, setWeight] = useState(125);
  const [rank, setRank] = useState(1);

  useEffect(() => {
    const next = existing.filter(w => w.weight === weight).length + 1;
    setRank(next);
  }, [weight]);

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
      <div className="card rounded-lg p-6 w-full max-w-md">
        <h3 className="display text-2xl mb-4">Add Wrestler</h3>
        <div className="space-y-3">
          <div>
            <label className="text-xs text-zinc-400 block mb-1">Name</label>
            <input value={name} onChange={e => setName(e.target.value)} className="w-full" autoFocus />
          </div>
          <div>
            <label className="text-xs text-zinc-400 block mb-1">School</label>
            <input value={school} onChange={e => setSchool(e.target.value)} className="w-full" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-zinc-400 block mb-1">Weight</label>
              <select value={weight} onChange={e => setWeight(parseInt(e.target.value))} className="w-full">
                {WEIGHTS.map(w => <option key={w} value={w}>{w}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs text-zinc-400 block mb-1">Rank</label>
              <input type="number" min="1" value={rank} onChange={e => setRank(parseInt(e.target.value) || 1)} className="w-full" />
            </div>
          </div>
        </div>
        <div className="flex justify-end gap-2 mt-5">
          <button onClick={onClose} className="secondary">Cancel</button>
          <button onClick={() => name && school && onAdd({ name, school, weight, rank })} className="primary">Add</button>
        </div>
      </div>
    </div>
  );
}

// ========== COACHES ==========
function CoachesTab({ state, update }) {
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [search, setSearch] = useState('');

  const filtered = useMemo(() => {
    return state.coaches
      .filter(c => !search || (c.name + c.school).toLowerCase().includes(search.toLowerCase()))
      .sort((a, b) => a.rank - b.rank);
  }, [state.coaches, search]);

  const draftedIds = useMemo(() => {
    const set = new Set();
    Object.values(state.coachRosters).forEach(arr => (arr || []).forEach(id => set.add(id)));
    return set;
  }, [state.coachRosters]);

  const updateCoach = (id, field, val) => {
    update(s => ({ ...s, coaches: s.coaches.map(c => c.id === id ? { ...c, [field]: val } : c) }));
  };
  const deleteCoach = (id) => {
    if (draftedIds.has(id)) { alert('Cannot delete — already drafted.'); return; }
    update(s => ({ ...s, coaches: s.coaches.filter(c => c.id !== id) }));
  };
  const addCoach = (data) => {
    const newId = `c${uid()}`;
    update(s => ({ ...s, coaches: [...s.coaches, { id: newId, ...data }] }));
    setShowAdd(false);
  };
  const moveUp = (id) => update(s => ({ ...s, coaches: moveRank(s.coaches, id, -1, null) }));
  const moveDown = (id) => update(s => ({ ...s, coaches: moveRank(s.coaches, id, +1, null) }));

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="display text-4xl">Coaching Pool</h2>
          <p className="text-xs text-zinc-500 mt-1">Ranked by final 2025-26 NWCA Coaches Poll (Feb 23, 2026). Use ↑/↓ to rerank. Verify info — coaching changes happen.</p>
          <p className="text-xs text-zinc-400 mt-1">📊 <span className="text-[var(--gold)]">Scoring:</span> Coaches earn <span className="text-green-400 mono">+10</span> per dual win and <span className="text-rose-400 mono">-10</span> per loss. Add the dual to Pick'em and set the winner to credit your coaches. Live record auto-tracks from settled duals.</p>
        </div>
        <button onClick={() => setShowAdd(true)} className="primary">+ Add Coach</button>
      </div>

      <div className="card rounded-lg p-4">
        <input placeholder="Search coach or school..." value={search} onChange={e => setSearch(e.target.value)} className="w-full" />
      </div>

      <div className="card rounded-lg overflow-hidden">
        <div className="overflow-x-auto scrollbar max-h-[600px]">
          <table className="w-full text-sm">
            <thead className="bg-[var(--panel-2)] sticky top-0 z-10">
              <tr>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">#</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400 w-20">Rank</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Coach</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Program</th>
                <th className="text-center px-3 py-3 text-xs uppercase tracking-wider text-zinc-400" title="Final 2025-26 dual record from NWCA Coaches Poll">'25-26</th>
                <th className="text-center px-3 py-3 text-xs uppercase tracking-wider text-zinc-400" title="Live record from settled Pick'em duals this season">Live</th>
                <th className="text-left px-3 py-3 text-xs uppercase tracking-wider text-zinc-400">Status</th>
                <th className="px-3 py-3"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => {
                const isFirst = c.rank === 1;
                const isLast = c.rank === state.coaches.length;
                const live = getCoachRecord(c, state);
                return (
                  <tr key={c.id} className="border-t border-zinc-800 hover:bg-[var(--panel-2)]">
                    <td className="px-3 py-2 mono text-zinc-400">#{c.rank}</td>
                    <td className="px-3 py-2">
                      <div className="flex gap-1">
                        <button onClick={() => moveUp(c.id)} disabled={isFirst} className="rank-arrow">▲</button>
                        <button onClick={() => moveDown(c.id)} disabled={isLast} className="rank-arrow">▼</button>
                      </div>
                    </td>
                    <td className="px-3 py-2 font-semibold">
                      {editing === c.id
                        ? <input value={c.name} onChange={e => updateCoach(c.id, 'name', e.target.value)} className="w-full" />
                        : c.name}
                    </td>
                    <td className="px-3 py-2 text-zinc-400">
                      {editing === c.id
                        ? <input value={c.school} onChange={e => updateCoach(c.id, 'school', e.target.value)} className="w-full" />
                        : c.school}
                    </td>
                    <td className="px-3 py-2 text-center mono text-zinc-400 text-xs">
                      {editing === c.id
                        ? <input value={c.priorRecord || ''} onChange={e => updateCoach(c.id, 'priorRecord', e.target.value)} className="w-16 text-xs" />
                        : (c.priorRecord || '—')}
                    </td>
                    <td className="px-3 py-2 text-center mono text-xs">
                      {(live.wins + live.losses) > 0
                        ? <span><span className="text-green-400">{live.wins}</span>-<span className="text-rose-400">{live.losses}</span></span>
                        : <span className="text-zinc-700">0-0</span>}
                    </td>
                    <td className="px-3 py-2">
                      {draftedIds.has(c.id)
                        ? <span className="pill pill-gray">Drafted</span>
                        : <span className="pill pill-green">Available</span>}
                    </td>
                    <td className="px-3 py-2 text-right whitespace-nowrap">
                      {editing === c.id
                        ? <button onClick={() => setEditing(null)} className="primary text-xs py-1 px-2">Save</button>
                        : <>
                            <button onClick={() => setEditing(c.id)} className="ghost text-xs">Edit</button>
                            <button onClick={() => deleteCoach(c.id)} className="ghost text-xs text-rose-400">Del</button>
                          </>
                      }
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {showAdd && <AddCoachModal onAdd={addCoach} onClose={() => setShowAdd(false)} existingCount={state.coaches.length} />}
    </div>
  );
}

        <div className="flex justify-end gap-2 mt-5">
          <button onClick={onClose} className="secondary">Cancel</button>
          <button onClick={() => name && school && onAdd({ name, school, rank: existingCount + 1, priorRecord: priorRecord || '—' })} className="primary">Add</button>
        </div>
      </div>
    </div>
  );
}

// ========== DRAFT (wrestlers + coaches in one combined draft) ==========
function DraftTab({ state, update }) {
  const [filterWeight, setFilterWeight] = useState('all');
  const [search, setSearch] = useState('');

  const startWrestlerDraft = () => {
    if (state.managers.length < 2) { alert('Need at least 2 managers to draft.'); return; }
    if (!confirm(`Start snake draft with ${state.managers.length} managers? 23 rounds: 20 wrestlers + 3 coaches per team, in whatever order you want.`)) return;
    const ids = state.managers.map(m => m.id);
    const order = buildSnakeOrder(ids, 23);
    update(s => ({
      ...s,
      draft: { order, picks: [], currentPickIndex: 0, isComplete: false, started: true },
      rosters: Object.fromEntries(ids.map(id => [id, []])),
      coachRosters: Object.fromEntries(ids.map(id => [id, []])),
    }));
  };

  // ===== Pre-draft =====
  if (!state.draft.started) {
    return (
      <div className="space-y-6">
        <h2 className="display text-4xl">Draft</h2>
        <div className="card rounded-lg p-8 text-center">
          <div className="display text-6xl text-[var(--red)] mb-3">READY?</div>
          <p className="text-zinc-400 mb-6">Snake draft, 23 rounds. Each team drafts 20 wrestlers (2 per weight) plus 3 coaches — pick them in any order you want.</p>
          <div className="card-2 rounded-lg p-4 max-w-md mx-auto mb-6">
            <div className="text-xs uppercase tracking-wider text-zinc-500 mb-2">Draft Order</div>
            {state.managers.length === 0 ? <div className="text-zinc-500 italic">No managers yet</div> :
              <ol className="space-y-1 text-left">
                {state.managers.map((m, i) => (
                  <li key={m.id} className="flex items-center gap-3">
                    <span className="mono text-zinc-500 w-6">{i + 1}.</span>
                    <TeamBadge manager={m} size="xs" />
                    <span>{displayName(m)}</span>
                  </li>
                ))}
              </ol>
            }
          </div>
          <button onClick={startWrestlerDraft} className="primary" disabled={state.managers.length < 2}>
            🏁 Start Draft
          </button>
        </div>
      </div>
    );
  }

  // ===== Draft complete =====
  if (state.draft.isComplete) {
    return (
      <div className="space-y-6">
        <h2 className="display text-4xl flex items-center gap-3 flex-wrap">Draft <span className="pill pill-gold">Complete</span></h2>
        <div className="card rounded-lg p-6">
          <p className="text-zinc-300 mb-4">23 rounds locked. Head to <strong>Teams</strong> to see rosters or <strong>Matchups</strong> to log weekly results.</p>
        </div>
        <div className="card rounded-lg p-6">
          <h3 className="display text-2xl mb-3">Draft Board</h3>
          <DraftBoard state={state} kind="wrestler" />
        </div>
      </div>
    );
  }

  // ===== Active draft =====
  return <WrestlerDraftActive state={state} update={update} filterWeight={filterWeight} setFilterWeight={setFilterWeight} search={search} setSearch={setSearch} />;
}

// ========== BEST AVAILABLE PANEL ==========
// Shows the top 3 wrestlers at each weight the current manager still needs,
// plus top coaches if they have coach slots open. Lets them draft directly
// from here without scrolling through the full list.
function BestAvailablePanel({
  state, managerCounts, draftedWrestlerIds, draftedCoachIds,
  onPickWrestler, onPickCoach, setFilterWeight, setPoolMode,
}) {
  // Which weights are still needed (have less than 2)
  const neededWeights = WEIGHTS.filter(w => (managerCounts.byWeight[w] || 0) < 2);
  const wrestlersFull = managerCounts.wrestlers >= 20;
  const needsCoaches = managerCounts.coaches < 3;

  // Top 3 at each needed weight, sorted by rank
  const bestByWeight = useMemo(() => {
    const result = {};
    neededWeights.forEach(w => {
      result[w] = state.wrestlers
        .filter(wr => !wr.watchlist && wr.weight === w && !draftedWrestlerIds.has(wr.id))
        .sort((a, b) => a.rank - b.rank)
        .slice(0, 3);
    });
    return result;
  }, [state.wrestlers, draftedWrestlerIds, neededWeights.join(',')]);

  // Top 3 available coaches
  const bestCoaches = useMemo(() =>
    state.coaches
      .filter(c => !draftedCoachIds.has(c.id))
      .sort((a, b) => a.rank - b.rank)
      .slice(0, 3),
  [state.coaches, draftedCoachIds]);

  // If they're locked into needing only coaches (wrestlers full), or vice versa, suggest accordingly
  if (neededWeights.length === 0 && !needsCoaches) {
    return (
      <div className="card rounded-lg p-4 text-center">
        <div className="display text-2xl text-emerald-400">✓ Roster Complete</div>
        <div className="text-xs text-zinc-500 mt-1">Your team has 20 wrestlers (2 per weight) + 3 coaches.</div>
      </div>
    );
  }

  return (
    <div className="card rounded-lg overflow-hidden">
      <div className="px-4 py-2 border-b border-zinc-800 flex items-center justify-between flex-wrap gap-2">
        <h3 className="display text-lg flex items-center gap-2">⚡ Best Available <span className="text-xs text-zinc-500 font-normal">for your roster</span></h3>
        <div className="text-[10px] text-zinc-500 uppercase tracking-wider">
          {neededWeights.length} weight{neededWeights.length !== 1 ? 's' : ''} needed · {3 - managerCounts.coaches} coach slot{(3 - managerCounts.coaches) !== 1 ? 's' : ''} open
        </div>
      </div>

      <div className="p-3 space-y-3">
        {/* Wrestler suggestions by needed weight */}
        {!wrestlersFull && neededWeights.length > 0 && (
          <div className="space-y-1.5">
            {neededWeights.map(w => {
              const top = bestByWeight[w] || [];
              const currentAtWeight = managerCounts.byWeight[w] || 0;
              const slotsLeft = 2 - currentAtWeight;
              return (
                <div key={w} className="card-2 rounded p-2">
                  <div className="flex items-center gap-2 mb-1.5">
                    <span className={`mono text-xs px-1.5 py-0.5 rounded font-bold ${currentAtWeight === 1 ? 'bg-amber-900/50 text-amber-300' : 'bg-rose-900/50 text-rose-300'}`}>
                      {w} lbs
                    </span>
                    <span className="text-[10px] text-zinc-500 uppercase">need {slotsLeft} more</span>
                    <button
                      onClick={() => { setFilterWeight(String(w)); setPoolMode('wrestlers'); }}
                      className="ml-auto text-[10px] text-zinc-400 hover:text-zinc-200">
                      view all {w} →
                    </button>
                  </div>
                  {top.length === 0 ? (
                    <div className="text-xs text-zinc-500 italic px-1">No wrestlers left at {w}.</div>
                  ) : (
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-1.5">
                      {top.map(wr => (
                        <button
                          key={wr.id}
                          onClick={() => onPickWrestler(wr.id)}
                          className="text-left flex items-center gap-2 p-1.5 rounded bg-zinc-900/50 hover:bg-rose-900/30 border border-zinc-800 hover:border-rose-700 transition">
                          <span className="mono text-[10px] text-zinc-500 w-6">#{wr.rank}</span>
                          <WrestlerAvatar wrestler={wr} size="xs" />
                          <div className="flex-1 min-w-0">
                            <div className="text-xs font-semibold truncate flex items-center gap-1">
                              {wr.name}
                              {wr.year && <span className="text-[8px] text-zinc-500">{wr.year}</span>}
                            </div>
                            <div className="text-[10px] text-zinc-500 truncate">{wr.school}</div>
                          </div>
                          <span className="text-[9px] font-bold text-[var(--red)]">DRAFT</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* Coach suggestions */}
        {needsCoaches && bestCoaches.length > 0 && (
          <div className="card-2 rounded p-2" style={{ borderLeft: '3px solid var(--gold)' }}>
            <div className="flex items-center gap-2 mb-1.5">
              <span className="mono text-xs px-1.5 py-0.5 rounded font-bold bg-amber-900/50" style={{ color: 'var(--gold)' }}>
                🎯 COACHES
              </span>
              <span className="text-[10px] text-zinc-500 uppercase">need {3 - managerCounts.coaches} more</span>
              <button
                onClick={() => setPoolMode('coaches')}
                className="ml-auto text-[10px] text-zinc-400 hover:text-zinc-200">
                view all coaches →
              </button>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-1.5">
              {bestCoaches.map(c => (
                <button
                  key={c.id}
                  onClick={() => onPickCoach(c.id)}
                  className="text-left flex items-center gap-2 p-1.5 rounded bg-zinc-900/50 hover:bg-amber-900/20 border border-zinc-800 hover:border-amber-700 transition">
                  <span className="mono text-[10px] w-6" style={{ color: 'var(--gold)' }}>#{c.rank}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold truncate">{c.name}</div>
                    <div className="text-[10px] text-zinc-500 truncate">{c.school}</div>
                  </div>
                  <span className="text-[9px] font-bold" style={{ color: 'var(--gold)' }}>DRAFT</span>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function WrestlerDraftActive({ state, update, filterWeight, setFilterWeight, search, setSearch }) {
  const draftedWrestlerIds = useMemo(() => new Set(state.draft.picks.filter(p => p.wrestlerId).map(p => p.wrestlerId)), [state.draft.picks]);
  const draftedCoachIds = useMemo(() => new Set(state.draft.picks.filter(p => p.coachId).map(p => p.coachId)), [state.draft.picks]);
  const currentPick = state.draft.order[state.draft.currentPickIndex];
  const currentManager = currentPick ? state.managers.find(m => m.id === currentPick.managerId) : null;

  // Pool mode: 'wrestlers' or 'coaches' — toggle to switch the picker view
  const [poolMode, setPoolMode] = useState('wrestlers');

  // ===== 30-SECOND DRAFT TIMER =====
  const DRAFT_TIMER_SECONDS = 30;
  const [timeLeft, setTimeLeft] = useState(DRAFT_TIMER_SECONDS);
  const [timerPaused, setTimerPaused] = useState(false);

  // Reset timer whenever a pick happens (new pickIndex)
  useEffect(() => {
    setTimeLeft(DRAFT_TIMER_SECONDS);
  }, [state.draft.currentPickIndex]);

  // Tick down every second when not paused and not 0
  useEffect(() => {
    if (timerPaused || timeLeft <= 0) return;
    const id = setTimeout(() => setTimeLeft(t => Math.max(0, t - 1)), 1000);
    return () => clearTimeout(id);
  }, [timeLeft, timerPaused]);

  // ===== END TIMER =====

  // Active manager's roster counts (wrestlers by weight + total coaches)
  const managerCounts = useMemo(() => {
    if (!currentPick) return { byWeight: {}, coaches: 0, wrestlers: 0 };
    const byWeight = {};
    WEIGHTS.forEach(w => byWeight[w] = 0);
    let coaches = 0, wrestlers = 0;
    state.draft.picks
      .filter(p => p.managerId === currentPick.managerId)
      .forEach(p => {
        if (p.wrestlerId) {
          const wr = state.wrestlers.find(w => w.id === p.wrestlerId);
          if (wr) { byWeight[wr.weight]++; wrestlers++; }
        } else if (p.coachId) {
          coaches++;
        }
      });
    return { byWeight, coaches, wrestlers };
  }, [state.draft.picks, currentPick]);

  const managerRosterByWeight = managerCounts.byWeight; // alias

  // Wrestlers available (filtered)
  const availableWrestlers = useMemo(() => {
    if (filterWeight === 'p4p') {
      // P4P mode: show only the top 33 P4P wrestlers, sorted by P4P rank
      return state.wrestlers
        .filter(w => !w.watchlist)
        .filter(w => !draftedWrestlerIds.has(w.id))
        .filter(w => P4P_TOP_33_SET.has(`${w.name}|${w.school}`))
        .filter(w => !search || w.name.toLowerCase().includes(search.toLowerCase()) || w.school.toLowerCase().includes(search.toLowerCase()))
        .sort((a, b) => (P4P_RANK.get(`${a.name}|${a.school}`) || 999) - (P4P_RANK.get(`${b.name}|${b.school}`) || 999));
    }
    return state.wrestlers
      .filter(w => !w.watchlist)
      .filter(w => !draftedWrestlerIds.has(w.id))
      .filter(w => filterWeight === 'all' || w.weight === parseInt(filterWeight))
      .filter(w => !search || w.name.toLowerCase().includes(search.toLowerCase()) || w.school.toLowerCase().includes(search.toLowerCase()))
      .sort((a, b) => a.weight - b.weight || a.rank - b.rank);
  }, [state.wrestlers, draftedWrestlerIds, filterWeight, search]);

  // Coaches available (filtered)
  const availableCoaches = useMemo(() => state.coaches
    .filter(c => !draftedCoachIds.has(c.id))
    .filter(c => !search || c.name.toLowerCase().includes(search.toLowerCase()) || c.school.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => a.rank - b.rank),
  [state.coaches, draftedCoachIds, search]);

  const available = poolMode === 'coaches' ? availableCoaches : availableWrestlers;

  const makePick = (wrestlerId) => {
    const wr = state.wrestlers.find(w => w.id === wrestlerId);
    if (!wr) return;
    if (managerCounts.wrestlers >= 20) {
      alert(`${currentManager.name} already has 20 wrestlers. Pick a coach instead.`);
      return;
    }
    if (managerRosterByWeight[wr.weight] >= 2) {
      alert(`${currentManager.name} already has 2 wrestlers at ${wr.weight}.`);
      return;
    }
    update(s => {
      const newPicks = [...s.draft.picks, {
        round: currentPick.round,
        pickIndex: s.draft.currentPickIndex,
        managerId: currentPick.managerId,
        wrestlerId,
      }];
      const newRosters = { ...s.rosters };
      newRosters[currentPick.managerId] = [...(newRosters[currentPick.managerId] || []), wrestlerId];
      const nextIdx = s.draft.currentPickIndex + 1;
      const isComplete = nextIdx >= s.draft.order.length;
      return {
        ...s,
        draft: { ...s.draft, picks: newPicks, currentPickIndex: nextIdx, isComplete },
        rosters: newRosters,
      };
    });
  };

  const makeCoachPick = (coachId) => {
    if (managerCounts.coaches >= 3) {
      alert(`${currentManager.name} already has 3 coaches.`);
      return;
    }
    update(s => {
      const newPicks = [...s.draft.picks, {
        round: currentPick.round,
        pickIndex: s.draft.currentPickIndex,
        managerId: currentPick.managerId,
        coachId,
      }];
      const newCoachRosters = { ...s.coachRosters };
      newCoachRosters[currentPick.managerId] = [...(newCoachRosters[currentPick.managerId] || []), coachId];
      const nextIdx = s.draft.currentPickIndex + 1;
      const isComplete = nextIdx >= s.draft.order.length;
      return {
        ...s,
        draft: { ...s.draft, picks: newPicks, currentPickIndex: nextIdx, isComplete },
        coachRosters: newCoachRosters,
      };
    });
  };

  const undoPick = () => {
    if (state.draft.picks.length === 0) return;
    if (!confirm('Undo last pick?')) return;
    update(s => {
      const last = s.draft.picks[s.draft.picks.length - 1];
      const newPicks = s.draft.picks.slice(0, -1);
      if (last.wrestlerId) {
        const newRosters = { ...s.rosters };
        newRosters[last.managerId] = (newRosters[last.managerId] || []).filter(id => id !== last.wrestlerId);
        return { ...s, draft: { ...s.draft, picks: newPicks, currentPickIndex: s.draft.currentPickIndex - 1, isComplete: false }, rosters: newRosters };
      } else if (last.coachId) {
        const newCoachRosters = { ...s.coachRosters };
        newCoachRosters[last.managerId] = (newCoachRosters[last.managerId] || []).filter(id => id !== last.coachId);
        return { ...s, draft: { ...s.draft, picks: newPicks, currentPickIndex: s.draft.currentPickIndex - 1, isComplete: false }, coachRosters: newCoachRosters };
      }
      return s;
    });
  };

  return (
    <div className="space-y-4">
      <div className="card rounded-lg overflow-hidden glow-red">
        <div className="p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-3 stripe">
          <div className="flex items-center gap-4">
            <TeamBadge manager={currentManager} size="lg" />
            <div>
              <div className="text-xs uppercase tracking-wider text-zinc-400">On the clock · Round {currentPick.round} · Pick {state.draft.currentPickIndex + 1} of {state.draft.order.length}</div>
              <div className="display text-3xl">{displayName(currentManager)}</div>
              {currentManager?.teamName && <div className="text-xs text-zinc-500">Manager: {currentManager.name}</div>}
            </div>
          </div>
          <div className="flex items-center gap-3">
            {/* DRAFT TIMER */}
            <div className="text-center" title={timerPaused ? 'Paused' : 'Tick tick tick...'}>
              <div className="text-[10px] uppercase tracking-wider text-zinc-500">Time</div>
              <div className={`display text-4xl mono ${timeLeft <= 5 ? 'text-rose-400 animate-pulse' : timeLeft <= 10 ? 'text-amber-300' : 'text-emerald-300'}`}>
                :{String(timeLeft).padStart(2, '0')}
              </div>
              <div className="flex gap-1 mt-1">
                <button onClick={() => setTimerPaused(p => !p)} className="text-[10px] px-2 py-0.5 card-2 rounded">{timerPaused ? '▶ Resume' : '⏸ Pause'}</button>
                <button onClick={() => setTimeLeft(DRAFT_TIMER_SECONDS)} className="text-[10px] px-2 py-0.5 card-2 rounded">↻ Reset</button>
              </div>
            </div>
            <button onClick={undoPick} className="secondary text-sm" disabled={state.draft.picks.length === 0}>← Undo Pick</button>
          </div>
        </div>
        <div className="px-5 py-3 border-t border-zinc-800 flex flex-wrap gap-2 text-xs items-center">
          <span className="text-zinc-500 mr-2">Needs:</span>
          {WEIGHTS.map(w => {
            const c = managerRosterByWeight[w] || 0;
            const full = c >= 2;
            return (
              <span key={w} className={`mono px-2 py-0.5 rounded ${full ? 'bg-zinc-800 text-zinc-600 line-through' : c === 1 ? 'bg-amber-900/40 text-amber-300' : 'bg-rose-900/40 text-rose-300'}`}>
                {w} ({c}/2)
              </span>
            );
          })}
          <span className={`mono px-2 py-0.5 rounded ${managerCounts.coaches >= 3 ? 'bg-zinc-800 text-zinc-600 line-through' : 'bg-amber-900/40 text-amber-300'}`}>
            🎯 Coaches ({managerCounts.coaches}/3)
          </span>
        </div>
      </div>

      {/* BEST AVAILABLE — auto-suggests top picks for needed weights + coaches */}
      <BestAvailablePanel
        state={state}
        managerCounts={managerCounts}
        draftedWrestlerIds={draftedWrestlerIds}
        draftedCoachIds={draftedCoachIds}
        onPickWrestler={makePick}
        onPickCoach={makeCoachPick}
        setFilterWeight={setFilterWeight}
        setPoolMode={setPoolMode}
      />

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div className="lg:col-span-2 card rounded-lg">
          <div className="p-4 border-b border-zinc-800 space-y-2">
            {/* Mode toggle: Wrestlers / Coaches */}
            <div className="flex gap-1">
              <button onClick={() => setPoolMode('wrestlers')}
                className={`flex-1 px-3 py-1.5 rounded text-sm font-semibold ${poolMode === 'wrestlers' ? 'bg-[var(--red)] text-white' : 'card-2'}`}>
                🤼 Wrestlers ({managerCounts.wrestlers}/20)
              </button>
              <button onClick={() => setPoolMode('coaches')}
                className={`flex-1 px-3 py-1.5 rounded text-sm font-semibold ${poolMode === 'coaches' ? 'text-black' : 'card-2'}`}
                style={poolMode === 'coaches' ? { background: 'var(--gold)' } : {}}>
                🎯 Coaches ({managerCounts.coaches}/3)
              </button>
            </div>
            {/* Filter row (weights for wrestlers, just search for coaches) */}
            <div className="flex flex-wrap gap-2 items-center">
              {poolMode === 'wrestlers' && (
                <div className="flex flex-wrap gap-1">
                  <button onClick={() => setFilterWeight('all')} className={`px-2.5 py-1 rounded text-xs font-semibold ${filterWeight === 'all' ? 'bg-[var(--red)] text-white' : 'card-2'}`}>All</button>
                  <button onClick={() => setFilterWeight('p4p')}
                    className={`px-2.5 py-1 rounded text-xs font-semibold ${filterWeight === 'p4p' ? 'text-black' : 'card-2'}`}
                    style={filterWeight === 'p4p' ? { background: 'var(--gold)' } : {}}
                    title="Top 33 wrestlers regardless of weight">
                    ⭐ Top 33 P4P
                  </button>
                  {WEIGHTS.map(w => (
                    <button key={w} onClick={() => setFilterWeight(String(w))} className={`px-2.5 py-1 rounded text-xs font-semibold mono ${filterWeight === String(w) ? 'bg-[var(--red)] text-white' : 'card-2'}`}>{w}</button>
                  ))}
                </div>
              )}
              <input placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} className="flex-1 min-w-[150px] text-sm" />
            </div>
          </div>
          <div className="max-h-[500px] overflow-y-auto scrollbar">
            {available.length === 0 && <div className="p-6 text-center text-zinc-500">No available {poolMode === 'coaches' ? 'coaches' : 'wrestlers'} match filter.</div>}
            {poolMode === 'wrestlers' && available.map(w => {
              const weightFull = (managerRosterByWeight[w.weight] || 0) >= 2;
              const wrestlersFull = managerCounts.wrestlers >= 20;
              const full = weightFull || wrestlersFull;
              const p4pRank = P4P_RANK.get(`${w.name}|${w.school}`);
              return (
                <div key={w.id} className="px-4 py-2.5 border-t border-zinc-800 flex items-center justify-between hover:bg-[var(--panel-2)]">
                  <div className="flex items-center gap-3">
                    {filterWeight === 'p4p' && p4pRank && (
                      <span className="mono text-xs font-bold w-8 text-center px-1 py-0.5 rounded" style={{ background: 'var(--gold)', color: 'black' }}>
                        ⭐{p4pRank}
                      </span>
                    )}
                    <span className="mono text-xs text-zinc-500 w-10">{w.weight}</span>
                    <span className="mono text-xs text-zinc-500 w-8">#{w.rank}</span>
                    <WrestlerAvatar wrestler={w} size="sm" />
                    <div>
                      <div className="font-semibold flex items-center gap-1.5">
                        {w.name}
                        {w.year && <span className="pill pill-gray text-[9px] uppercase">{w.year}</span>}
                      </div>
                      <div className="text-xs text-zinc-400">{w.school}</div>
                    </div>
                  </div>
                  <button onClick={() => makePick(w.id)} disabled={full}
                    className={`text-xs font-bold px-3 py-1.5 rounded ${full ? 'bg-zinc-800 text-zinc-600 cursor-not-allowed' : 'bg-[var(--red)] text-white hover:bg-rose-700'}`}>
                    {wrestlersFull ? 'Roster Full' : weightFull ? 'Weight Full' : 'DRAFT'}
                  </button>
                </div>
              );
            })}
            {poolMode === 'coaches' && available.map(c => {
              const full = managerCounts.coaches >= 3;
              return (
                <div key={c.id} className="px-4 py-2.5 border-t border-zinc-800 flex items-center justify-between hover:bg-[var(--panel-2)]">
                  <div className="flex items-center gap-3">
                    <span className="mono text-xs text-[var(--gold)] w-10">#{c.rank}</span>

function DraftBoard({ state, kind }) {
  // Unified draft: 23 rounds. Each pick has either wrestlerId OR coachId.
  const numRounds = 23;
  const managers = state.managers;
  const picks = state.draft.picks;

  const grid = [];
  for (let r = 1; r <= numRounds; r++) {
    const row = managers.map(m => {
      const pick = picks.find(p => p.round === r && p.managerId === m.id);
      if (!pick) return null;
      if (pick.wrestlerId) {
        const w = state.wrestlers.find(x => x.id === pick.wrestlerId);
        return w ? { ...w, _kind: 'wrestler' } : null;
      }
      if (pick.coachId) {
        const c = state.coaches.find(x => x.id === pick.coachId);
        return c ? { ...c, _kind: 'coach' } : null;
      }
      return null;
    });
    grid.push(row);
  }
  return (
    <div className="overflow-x-auto scrollbar">
      <table className="text-xs">
        <thead>
          <tr>
            <th className="px-2 py-2 text-zinc-500">R</th>
            {managers.map(m => (
              <th key={m.id} className="px-2 py-2 text-left min-w-[130px]" style={{ color: m.color }}>
                <div className="flex items-center gap-1.5">
                  <TeamBadge manager={m} size="xs" />
                  <span>{displayName(m)}</span>
                </div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {grid.map((row, ri) => (
            <tr key={ri} className="border-t border-zinc-800">
              <td className="px-2 py-2 mono text-zinc-500">{ri + 1}</td>
              {row.map((it, mi) => (
                <td key={mi} className="px-2 py-2">
                  {it ? (
                    <div>
                      {it._kind === 'wrestler'
                        ? <div className="mono text-zinc-500 text-[10px]">{it.weight}</div>
                        : <div className="mono text-[var(--gold)] text-[10px]">COACH</div>}
                      <div className="font-semibold">{it.name}</div>
                      <div className="text-zinc-500">{it.school}</div>
                    </div>
                  ) : <span className="text-zinc-700">—</span>}
                </td>
              ))}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ========== FREE AGENCY MODAL ==========
function FreeAgencyModal({ manager, state, update, onClose }) {
  const [weight, setWeight] = useState(null);
  const [cutId, setCutId] = useState(null);
  const [addId, setAddId] = useState(null);
  const [confirming, setConfirming] = useState(false);

  const myRoster = (state.rosters[manager.id] || [])
    .map(id => state.wrestlers.find(w => w.id === id))
    .filter(Boolean);

  // All drafted wrestler IDs across all managers (free agents are anyone not on a roster)
  const draftedIds = useMemo(() => {
    const s = new Set();
    Object.values(state.rosters).forEach(arr => (arr || []).forEach(id => s.add(id)));
    return s;
  }, [state.rosters]);

  const myAtWeight = myRoster.filter(w => w.weight === weight);
  const freeAgentsAtWeight = state.wrestlers
    .filter(w => !w.watchlist)  // exclude 2027 Watchlist (HS juniors) from FA pool
    .filter(w => w.weight === weight && !draftedIds.has(w.id))
    .sort((a, b) => a.rank - b.rank);

  const week = getCurrentWeek(state.league);

  const commit = () => {
    if (!cutId || !addId) return;
    const cut = state.wrestlers.find(w => w.id === cutId);
    const add = state.wrestlers.find(w => w.id === addId);
    if (!cut || !add || cut.weight !== add.weight) {
      alert('Same-weight swap required.');
      return;
    }
    update(s => {
      const newRoster = (s.rosters[manager.id] || []).filter(id => id !== cutId).concat(addId);
      return {
        ...s,
        rosters: { ...s.rosters, [manager.id]: newRoster },
        transactions: [
          ...(s.transactions || []),
          { id: uid(), week, managerId: manager.id, cutId, addId, timestamp: Date.now() },
        ],
      };
    });
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
      <div className="card rounded-lg w-full max-w-3xl max-h-[90vh] overflow-y-auto scrollbar">
        <div className="p-5 border-b border-zinc-800 flex items-center justify-between">
          <div>
            <h3 className="display text-3xl">Free Agency</h3>
            <p className="text-xs text-zinc-400 mt-1">Cut one wrestler, add a free agent at the SAME weight. Roster stays 20.</p>
          </div>
          <button onClick={onClose} className="ghost text-2xl">×</button>
        </div>

        <div className="p-5 space-y-4">
          {/* Step 1: Pick weight */}
          <div>
            <div className="text-xs uppercase tracking-wider text-zinc-400 mb-2">Step 1 · Pick Weight Class</div>
            <div className="flex flex-wrap gap-1">
              {WEIGHTS.map(w => (
                <button key={w} onClick={() => { setWeight(w); setCutId(null); setAddId(null); }}
                  className={`px-3 py-1.5 rounded text-sm font-semibold mono ${weight === w ? 'bg-[var(--red)] text-white' : 'card-2'}`}>
                  {w}
                </button>
              ))}
            </div>
          </div>

          {weight && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {/* Step 2: Choose who to cut */}
              <div className="card-2 rounded p-3">
                <div className="text-xs uppercase tracking-wider text-rose-400 mb-2">Step 2 · Cut From Roster</div>
                <div className="space-y-2">
                  {myAtWeight.length === 0 && <div className="text-sm text-zinc-500 italic">No wrestlers at this weight.</div>}
                  {myAtWeight.map(w => (
                    <button key={w.id} onClick={() => setCutId(w.id)}
                      className={`w-full text-left p-2 rounded transition flex items-center gap-2 ${cutId === w.id ? 'bg-rose-900/40 border border-rose-700' : 'card hover:bg-[var(--panel)]'}`}>
                      <WrestlerAvatar wrestler={w} size="sm" />
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-sm truncate flex items-center gap-1.5">
                          {w.name}
                          {w.year && <span className="pill pill-gray text-[9px] uppercase">{w.year}</span>}
                        </div>
                        <div className="text-xs text-zinc-400 truncate">{w.school} · #{w.rank}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Step 3: Choose free agent to add */}
              <div className="card-2 rounded p-3">
                <div className="text-xs uppercase tracking-wider text-green-400 mb-2">Step 3 · Add Free Agent ({freeAgentsAtWeight.length} available)</div>
                <div className="space-y-2 max-h-64 overflow-y-auto scrollbar">
                  {freeAgentsAtWeight.length === 0 && <div className="text-sm text-zinc-500 italic">No free agents at this weight.</div>}
                  {freeAgentsAtWeight.map(w => (
                    <button key={w.id} onClick={() => setAddId(w.id)}
                      className={`w-full text-left p-2 rounded transition flex items-center gap-2 ${addId === w.id ? 'bg-green-900/40 border border-green-700' : 'card hover:bg-[var(--panel)]'}`}>
                      <WrestlerAvatar wrestler={w} size="sm" />
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-sm truncate flex items-center gap-1.5">
                          {w.name}
                          {w.year && <span className="pill pill-gray text-[9px] uppercase">{w.year}</span>}
                        </div>
                        <div className="text-xs text-zinc-400 truncate">{w.school} · #{w.rank}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {weight && cutId && addId && (
            <div className="card-2 rounded p-4 border border-[var(--gold)]">
              <div className="text-xs uppercase tracking-wider text-[var(--gold)] mb-2">Confirm Swap</div>
              <div className="flex items-center justify-between gap-3 flex-wrap">
                <div className="text-sm">
                  <span className="text-rose-400 font-bold">CUT</span> {state.wrestlers.find(w => w.id === cutId)?.name}
                  <span className="text-zinc-600 mx-2">→</span>
                  <span className="text-green-400 font-bold">ADD</span> {state.wrestlers.find(w => w.id === addId)?.name}
                </div>
                <button onClick={commit} className="primary">Lock In Transaction</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ========== TRADE MODAL (manager-to-manager swap, wrestlers OR coaches) ==========
function TradeModal({ manager, state, update, onClose }) {
  const [tab, setTab] = useState('wrestler'); // 'wrestler' or 'coach'
  const [partnerId, setPartnerId] = useState(null);
  const [giveIds, setGiveIds] = useState([]);
  const [getIds, setGetIds] = useState([]);

  const otherManagers = state.managers.filter(m => m.id !== manager.id);
  const partner = otherManagers.find(m => m.id === partnerId);

  // Pool by tab
  const pool = tab === 'wrestler' ? state.wrestlers : state.coaches;
  const myRosterKey = tab === 'wrestler' ? 'rosters' : 'coachRosters';
  const myAssets = (state[myRosterKey][manager.id] || []).map(id => pool.find(p => p.id === id)).filter(Boolean);
  const partnerAssets = partner ? (state[myRosterKey][partner.id] || []).map(id => pool.find(p => p.id === id)).filter(Boolean) : [];

  const toggleGive = (id) => setGiveIds(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const toggleGet  = (id) => setGetIds(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);

  // Trade balance validation: wrestlers must keep 2-per-weight rule
  const tradeValidation = useMemo(() => {
    if (!partner || giveIds.length === 0 || getIds.length === 0) {
      return { ok: false, msg: giveIds.length === 0 || getIds.length === 0 ? 'Pick at least one asset from each side.' : 'Select a trade partner.' };
    }
    if (giveIds.length !== getIds.length) {
      return { ok: false, msg: 'Trade must be even — same number of assets each side.' };
    }
    if (tab === 'wrestler') {
      // Verify weight class balance for both managers
      const myNewIds = new Set([...(state.rosters[manager.id] || []).filter(id => !giveIds.includes(id)), ...getIds]);
      const partnerNewIds = new Set([...(state.rosters[partner.id] || []).filter(id => !getIds.includes(id)), ...giveIds]);
      const countByWeight = (ids) => {
        const c = {};
        ids.forEach(id => {
          const w = state.wrestlers.find(x => x.id === id);
          if (w) c[w.weight] = (c[w.weight] || 0) + 1;
        });
        return c;
      };
      const myWeights = countByWeight([...myNewIds]);
      const partnerWeights = countByWeight([...partnerNewIds]);
      for (const w of Object.values(myWeights))      if (w > 2) return { ok: false, msg: `Trade would give you 3+ wrestlers at one weight (max 2).` };
      for (const w of Object.values(partnerWeights)) if (w > 2) return { ok: false, msg: `Trade would give ${displayName(partner)} 3+ at one weight.` };
    }
    return { ok: true, msg: 'Trade is balanced. Lock it in.' };
  }, [giveIds, getIds, partner, tab, state, manager.id]);

  const week = getCurrentWeek(state.league);

  const executeTrade = () => {
    if (!tradeValidation.ok) return;
    if (!confirm(`Execute trade with ${displayName(partner)}?\n\nYou give: ${giveIds.length} ${tab}(s)\nYou get: ${getIds.length} ${tab}(s)\n\nThis cannot be undone.`)) return;
    update(s => {
      const rosterKey = tab === 'wrestler' ? 'rosters' : 'coachRosters';
      const newRosters = { ...s[rosterKey] };
      newRosters[manager.id] = [...(newRosters[manager.id] || []).filter(id => !giveIds.includes(id)), ...getIds];
      newRosters[partner.id] = [...(newRosters[partner.id] || []).filter(id => !getIds.includes(id)), ...giveIds];
      return {
        ...s,
        [rosterKey]: newRosters,
        transactions: [
          ...(s.transactions || []),
          {
            id: uid(),
            week,
            kind: 'trade',
            managerId: manager.id,
            partnerId: partner.id,
            giveIds: [...giveIds],
            getIds: [...getIds],
            assetType: tab,
            timestamp: Date.now(),
          },
        ],
      };
    });
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.85)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
