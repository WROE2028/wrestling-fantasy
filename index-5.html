// ========== BULK IMPORT WRESTLERS MODAL (paste a roster, parse, add) ==========
function BulkImportModal({ state, update, onClose }) {
  const [raw, setRaw] = useState('');
  const [defaultSchool, setDefaultSchool] = useState('');
  const [defaultWeight, setDefaultWeight] = useState('');
  const [parsed, setParsed] = useState(null);

  // Parse pasted text. Supports several formats:
  //   - "Luke Lilledahl|Penn State|125|SO"  (pipe-delimited, our format)
  //   - "125 Luke Lilledahl SO"             (weight-leading)
  //   - "Luke Lilledahl 125 SO"             (weight inline)
  //   - "Luke Lilledahl"                    (uses defaults)
  const parse = () => {
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const out = [];
    const valid = WEIGHTS;
    const years = ['FR','SO','JR','SR','RS','GR','5Y','RSO','RFR','RJR','RSR'];
    for (const line of lines) {
      let name = '', school = defaultSchool, weight = defaultWeight ? parseInt(defaultWeight) : null, year = '';

      // Pipe-delimited path
      if (line.includes('|')) {
        const parts = line.split('|').map(p => p.trim());
        name = parts[0] || '';
        school = parts[1] || school;
        weight = parseInt(parts[2]) || weight;
        year = (parts[3] || '').toUpperCase();
      } else {
        // Loose path: find weight number and year token, the rest is the name
        const tokens = line.split(/\s+/);
        const weightToken = tokens.find(t => valid.includes(parseInt(t)));
        const yearToken   = tokens.find(t => years.includes(t.toUpperCase()));
        if (weightToken) weight = parseInt(weightToken);
        if (yearToken)   year = yearToken.toUpperCase();
        name = tokens.filter(t => t !== weightToken && t !== yearToken).join(' ');
      }
      // Normalize redshirt-prefixed years
      if (year.startsWith('R') && year.length > 1) year = year.slice(1);
      if (!valid.includes(weight)) { out.push({ name, school, weight, year, valid: false, reason: 'Missing/invalid weight' }); continue; }
      if (!name) { out.push({ name, school, weight, year, valid: false, reason: 'Missing name' }); continue; }
      out.push({ name, school, weight, year, valid: true });
    }
    setParsed(out);
  };

  const importAll = () => {
    if (!parsed) return;
    const good = parsed.filter(p => p.valid);
    if (good.length === 0) { alert('No valid rows to import.'); return; }
    if (!confirm(`Import ${good.length} wrestler${good.length === 1 ? '' : 's'}? They'll be added to the end of their weight class — you can reorder later.`)) return;
    update(s => {
      const newOnes = good.map(p => {
        const sameWeight = s.wrestlers.filter(w => w.weight === p.weight);
        return {
          id: `w${uid()}`,
          name: p.name,
          school: p.school || 'Unknown',
          weight: p.weight,
          rank: sameWeight.length + 1,
          year: p.year || '',
        };
      });
      // Each addition increments rank in its weight class, but multiple imports at same weight collide
      // → renormalize after merging
      const merged = [...s.wrestlers, ...newOnes];
      const final = [];
      WEIGHTS.forEach(w => {
        merged.filter(x => x.weight === w).forEach((x, i) => final.push({ ...x, rank: i + 1 }));
      });
      return { ...s, wrestlers: final };
    });
    onClose();
  };

  const validCount   = parsed ? parsed.filter(p => p.valid).length : 0;
  const invalidCount = parsed ? parsed.length - validCount : 0;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.85)' }} onClick={onClose}>
      <div className="card rounded-lg max-w-3xl w-full max-h-[90vh] overflow-y-auto scrollbar" onClick={e => e.stopPropagation()}>
        <div className="stripe p-5 flex items-center justify-between">
          <div>
            <div className="text-xs uppercase tracking-wider text-[var(--gold)]">Bulk Import Wrestlers</div>
            <h2 className="display text-3xl mt-1">Paste a roster</h2>
          </div>
          <button onClick={onClose} className="text-zinc-400 hover:text-white text-2xl">×</button>
        </div>
        <div className="p-5 space-y-4">
          <div className="card-2 rounded p-3 text-xs space-y-1">
            <div className="font-semibold text-[var(--gold)]">Supported formats (one wrestler per line):</div>
            <div className="mono text-zinc-300">Luke Lilledahl|Penn State|125|SO</div>
            <div className="mono text-zinc-300">Luke Lilledahl 125 SO</div>
            <div className="mono text-zinc-300">125 Luke Lilledahl</div>
            <div className="text-zinc-500 mt-1">Tip: open a school's roster page, select all (Cmd+A), copy, paste here. Set "Default School" below and it auto-fills.</div>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs uppercase tracking-wider text-zinc-500 block mb-1">Default School (if missing)</label>
              <input value={defaultSchool} onChange={e => setDefaultSchool(e.target.value)}
                     placeholder="e.g. Penn State" className="w-full text-sm" />
            </div>
            <div>
              <label className="text-xs uppercase tracking-wider text-zinc-500 block mb-1">Default Weight (if missing)</label>
              <select value={defaultWeight} onChange={e => setDefaultWeight(e.target.value)} className="w-full text-sm">
                <option value="">— None —</option>
                {WEIGHTS.map(w => <option key={w} value={w}>{w}</option>)}
              </select>
            </div>
          </div>

          <div>
            <label className="text-xs uppercase tracking-wider text-zinc-500 block mb-1">Paste roster lines</label>
            <textarea value={raw} onChange={e => setRaw(e.target.value)}
                      placeholder="Luke Lilledahl 125 SO&#10;Beau Bartlett 141 SR&#10;Tyler Kasak 157 JR&#10;..."
                      className="w-full text-sm mono" rows="10" />
          </div>

          <div className="flex gap-2">
            <button onClick={parse} className="primary">Parse</button>
            <button onClick={() => { setRaw(''); setParsed(null); }} className="ghost">Clear</button>
          </div>

          {parsed && (
            <div className="card-2 rounded p-3 space-y-2">
              <div className="flex items-center justify-between">
                <div className="text-sm">
                  <span className="text-green-400 font-bold">{validCount}</span> valid
                  {invalidCount > 0 && <> · <span className="text-rose-400 font-bold">{invalidCount}</span> skipped</>}
                </div>
                {validCount > 0 && <button onClick={importAll} className="primary text-sm">+ Import {validCount}</button>}
              </div>
              <div className="max-h-64 overflow-y-auto scrollbar space-y-1">
                {parsed.map((p, i) => (
                  <div key={i} className={`text-xs flex items-center gap-2 p-1.5 rounded ${p.valid ? 'bg-green-900/20' : 'bg-rose-900/20'}`}>
                    <span className={p.valid ? 'text-green-400' : 'text-rose-400'}>{p.valid ? '✓' : '✗'}</span>
                    <span className="font-semibold">{p.name || '(no name)'}</span>
                    <span className="text-zinc-500">·</span>
                    <span className="text-zinc-400">{p.school || '?'}</span>
                    <span className="text-zinc-500">·</span>
                    <span className="mono">{p.weight || '?'}</span>
                    {p.year && <span className="pill pill-gray text-[9px]">{p.year}</span>}
                    {!p.valid && <span className="text-rose-400 ml-auto">{p.reason}</span>}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ========== MATCHUP ==========
function MatchupTab({ state, update }) {
  const week = getCurrentWeek(state.league);
  const [pairingMode, setPairingMode] = useState(false);
  const [view, setView] = useState('week'); // 'week' or 'season'
  const matchups = state.matchups[week] || [];

  // How many weeks does the season span?
  const seasonWeeks = useMemo(() => {
    if (!state.league.seasonStart || !state.league.seasonEnd) return 17;
    const start = new Date(state.league.seasonStart);
    const end = new Date(state.league.seasonEnd);
    const days = Math.floor((end - start) / (1000 * 60 * 60 * 24));
    return Math.max(1, Math.ceil(days / 7));
  }, [state.league.seasonStart, state.league.seasonEnd]);

  const autoPair = () => {
    if (state.managers.length < 2) { alert('Need at least 2 managers.'); return; }
    const ids = [...state.managers.map(m => m.id)];
    const pairs = [];
    while (ids.length >= 2) pairs.push({ managerA: ids.shift(), managerB: ids.shift() });
    update(s => ({ ...s, matchups: { ...s.matchups, [week]: pairs } }));
    setPairingMode(false);
  };

  const generateFullSchedule = () => {
    if (state.managers.length < 2) { alert('Need at least 2 managers.'); return; }
    const existing = Object.keys(state.matchups).filter(k => (state.matchups[k] || []).length > 0);
    if (existing.length > 0) {
      if (!confirm(`This will overwrite existing matchups for ${existing.length} week(s). Continue?`)) return;
    }
    const ids = state.managers.map(m => m.id);
    const weeks = generateRoundRobin(ids, seasonWeeks);
    const newMatchups = {};
    weeks.forEach((pairs, i) => { if (pairs.length > 0) newMatchups[i + 1] = pairs; });
    update(s => ({ ...s, matchups: newMatchups }));
  };

  const setMatchups = (newPairs) => {
    update(s => ({ ...s, matchups: { ...s.matchups, [week]: newPairs } }));
  };

  const advanceWeek = () => {
    if (state.league.autoWeek) { alert('Auto-week is ON. Turn it off in Setup to manually change weeks, or just wait — it updates automatically.'); return; }
    update(s => ({ ...s, league: { ...s.league, manualWeek: s.league.manualWeek + 1 } }));
  };
  const prevWeek = () => {
    if (state.league.autoWeek) { alert('Auto-week is ON. Turn it off in Setup to manually change weeks.'); return; }
    if (state.league.manualWeek <= 1) return;
    update(s => ({ ...s, league: { ...s.league, manualWeek: s.league.manualWeek - 1 } }));
  };

  return (
    <div className="space-y-4">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <h2 className="display text-4xl">{view === 'week' ? `Week ${week} Matchups` : 'Full Season Schedule'}</h2>
        <div className="flex gap-2 items-center flex-wrap">
          <div className="flex gap-1">
            <button onClick={() => setView('week')} className={`px-3 py-1.5 rounded text-sm font-semibold ${view === 'week' ? 'bg-[var(--red)] text-white' : 'card-2'}`}>This Week</button>
            <button onClick={() => setView('season')} className={`px-3 py-1.5 rounded text-sm font-semibold ${view === 'season' ? 'bg-[var(--red)] text-white' : 'card-2'}`}>Full Schedule</button>
          </div>
          {view === 'week' && (
            <>
              {state.league.autoWeek && <span className="pill pill-green">AUTO</span>}
              <button onClick={prevWeek} className="secondary" disabled={state.league.autoWeek}>← Prev</button>
              <button onClick={advanceWeek} className="secondary" disabled={state.league.autoWeek}>Next →</button>
            </>
          )}
        </div>
      </div>

      {view === 'season' ? (
        <SeasonScheduleView state={state} update={update} seasonWeeks={seasonWeeks} generateFullSchedule={generateFullSchedule} currentWeek={week} />
      ) : matchups.length === 0 ? (
        <div className="card rounded-lg p-8 text-center">
          <div className="display text-3xl mb-2 text-zinc-300">No matchups set for Week {week}</div>
          <p className="text-zinc-400 mb-4">Generate a round-robin schedule so everyone gets a matchup every week, or pair manually.</p>
          <div className="flex justify-center gap-2 flex-wrap">
            <button onClick={generateFullSchedule} className="primary">🗓️ Generate Full Season Schedule</button>
            <button onClick={autoPair} className="secondary">This Week Only</button>
            <button onClick={() => setPairingMode(true)} className="secondary">Manual Pairings</button>
          </div>
          <p className="text-xs text-zinc-500 mt-3">Round-robin: every manager plays every other manager. With {state.managers.length} managers, that's {Math.max(0, state.managers.length - 1)} weeks per cycle, repeated through {seasonWeeks} season weeks.</p>
          {pairingMode && <ManualPairings state={state} onSave={(p) => { setMatchups(p); setPairingMode(false); }} onCancel={() => setPairingMode(false)} />}
        </div>
      ) : (
        <div className="space-y-4">
          {matchups.map((m, i) => (
            <MatchupCard key={i} matchup={m} state={state} update={update} week={week} />
          ))}
          <button onClick={() => setMatchups([])} className="ghost text-sm">Clear pairings for week {week}</button>
        </div>
      )}
    </div>
  );
}

function SeasonScheduleView({ state, update, seasonWeeks, generateFullSchedule, currentWeek }) {
  const allWeeks = Array.from({ length: seasonWeeks }, (_, i) => i + 1);
  const scheduledCount = allWeeks.filter(w => (state.matchups[w] || []).length > 0).length;
  return (
    <div className="space-y-4">
      <div className="card rounded-lg p-4 flex flex-wrap items-center justify-between gap-3">
        <div>
          <div className="text-sm">
            <span className="text-zinc-400">Season length:</span> <span className="mono font-bold">{seasonWeeks}</span> weeks ·
            <span className="text-zinc-400 ml-2">Scheduled:</span> <span className="mono font-bold text-[var(--gold)]">{scheduledCount}/{seasonWeeks}</span>
          </div>
          <div className="text-xs text-zinc-500 mt-1">Round-robin keeps rotating — everyone gets a matchup every week.</div>
        </div>
        <button onClick={generateFullSchedule} className="primary">🗓️ Regenerate Schedule</button>
      </div>
      <div className="space-y-2">
        {allWeeks.map(w => {
          const pairs = state.matchups[w] || [];
          const isCurrent = w === currentWeek;
          return (
            <div key={w} className={`card rounded-lg p-3 ${isCurrent ? 'border-[var(--red)] glow-red' : ''}`}>
              <div className="flex items-center justify-between mb-2">
                <div className="display text-xl flex items-center gap-2">
                  Week {w}
                  {isCurrent && <span className="pill pill-red">CURRENT</span>}
                </div>
                {pairs.length === 0 && <span className="text-xs text-zinc-500">No matchups</span>}
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                {pairs.map((p, i) => {
                  const a = state.managers.find(m => m.id === p.managerA);
                  const b = state.managers.find(m => m.id === p.managerB);
                  if (!a || !b) return null;
                  return (
                    <div key={i} className="card-2 rounded p-2 flex items-center justify-between text-sm">
                      <div className="flex items-center gap-1.5 min-w-0">
                        <TeamBadge manager={a} size="xs" />
                        <span className="truncate">{displayName(a)}</span>
                      </div>
                      <span className="text-zinc-500 text-xs mx-1">vs</span>
                      <div className="flex items-center gap-1.5 min-w-0">
                        <TeamBadge manager={b} size="xs" />
                        <span className="truncate">{displayName(b)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ManualPairings({ state, onSave, onCancel }) {
  const [pairs, setPairs] = useState([{ managerA: '', managerB: '' }]);
  const addPair = () => setPairs([...pairs, { managerA: '', managerB: '' }]);
  const setPair = (i, field, val) => setPairs(pairs.map((p, j) => j === i ? { ...p, [field]: val } : p));
  const removePair = (i) => setPairs(pairs.filter((_, j) => j !== i));

  return (
    <div className="mt-6 card-2 rounded-lg p-4 text-left max-w-2xl mx-auto">
      <h4 className="display text-xl mb-3">Manual Pairings</h4>
      <div className="space-y-2">
        {pairs.map((p, i) => (
          <div key={i} className="flex gap-2 items-center">
            <select value={p.managerA} onChange={e => setPair(i, 'managerA', e.target.value)} className="flex-1">
              <option value="">Manager A</option>
              {state.managers.map(m => <option key={m.id} value={m.id}>{displayName(m)}</option>)}
            </select>
            <span className="text-zinc-500">vs</span>
            <select value={p.managerB} onChange={e => setPair(i, 'managerB', e.target.value)} className="flex-1">
              <option value="">Manager B</option>
              {state.managers.map(m => <option key={m.id} value={m.id}>{displayName(m)}</option>)}
            </select>
            <button onClick={() => removePair(i)} className="ghost text-sm">×</button>
          </div>
        ))}
      </div>
      <button onClick={addPair} className="ghost text-sm mt-2">+ Add Matchup</button>
      <div className="flex justify-end gap-2 mt-4">
        <button onClick={onCancel} className="secondary">Cancel</button>
        <button onClick={() => onSave(pairs.filter(p => p.managerA && p.managerB))} className="primary">Save Pairings</button>
      </div>
    </div>
  );
}

function MatchupCard({ matchup, state, update, week }) {
  const mgrA = state.managers.find(m => m.id === matchup.managerA);
  const mgrB = state.managers.find(m => m.id === matchup.managerB);
  if (!mgrA || !mgrB) return null;
  const weekData = state.weeklyResults[week] || {};

  const totA = useMemo(() => getManagerWeekTotal(mgrA.id, week, state), [state, mgrA.id, week]);
  const totB = useMemo(() => getManagerWeekTotal(mgrB.id, week, state), [state, mgrB.id, week]);
  const scoreA = totA.total;
  const scoreB = totB.total;

  const leadA = scoreA > scoreB;
  const leadB = scoreB > scoreA;

  return (
    <div className="card rounded-lg overflow-hidden">
      <div className="grid grid-cols-3 items-center p-4 border-b border-zinc-800">
        <div className={`flex flex-col items-end pr-3 ${leadA ? '' : 'opacity-60'}`}>
          <TeamBadge manager={mgrA} size="lg" />
          <div className="display text-xl mt-1">{displayName(mgrA)}</div>
          <div className="display text-5xl" style={{ color: mgrA.color }}>{scoreA}</div>
          {totA.coachPts !== 0 && (
            <div className="text-xs mono mt-1">
              <span className="text-zinc-500">W:</span> <span className="text-zinc-300">{totA.wrestlerPts}</span>
              <span className="text-zinc-500"> · C:</span> <span className={totA.coachPts > 0 ? 'text-[var(--gold)]' : 'text-rose-400'}>{totA.coachPts > 0 ? '+' : ''}{totA.coachPts}</span>
            </div>
          )}
        </div>
        <div className="text-center text-zinc-500 display text-xl">VS</div>
        <div className={`flex flex-col items-start pl-3 ${leadB ? '' : 'opacity-60'}`}>
          <TeamBadge manager={mgrB} size="lg" />
          <div className="display text-xl mt-1">{displayName(mgrB)}</div>
          <div className="display text-5xl" style={{ color: mgrB.color }}>{scoreB}</div>
          {totB.coachPts !== 0 && (
            <div className="text-xs mono mt-1">
              <span className="text-zinc-500">W:</span> <span className="text-zinc-300">{totB.wrestlerPts}</span>
              <span className="text-zinc-500"> · C:</span> <span className={totB.coachPts > 0 ? 'text-[var(--gold)]' : 'text-rose-400'}>{totB.coachPts > 0 ? '+' : ''}{totB.coachPts}</span>
            </div>
          )}
        </div>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-0 divide-x divide-zinc-800">
        <RosterResults manager={mgrA} state={state} update={update} week={week} />
        <RosterResults manager={mgrB} state={state} update={update} week={week} />
      </div>
    </div>
  );
}

function RosterResults({ manager, state, update, week }) {
  const roster = (state.rosters[manager.id] || []).map(wid => state.wrestlers.find(w => w.id === wid)).filter(Boolean);
  const sorted = [...roster].sort((a, b) => a.weight - b.weight || a.rank - b.rank);
  const weekData = state.weeklyResults[week] || {};

  const addResult = (wid, type) => {
    update(s => {
      const wd = { ...(s.weeklyResults[week] || {}) };
      wd[wid] = [...(wd[wid] || []), { type, note: '' }];
      return { ...s, weeklyResults: { ...s.weeklyResults, [week]: wd } };
    });
  };
  const removeResult = (wid, idx) => {
    update(s => {
      const wd = { ...(s.weeklyResults[week] || {}) };
      wd[wid] = (wd[wid] || []).filter((_, i) => i !== idx);
      if (wd[wid].length === 0) delete wd[wid];
      return { ...s, weeklyResults: { ...s.weeklyResults, [week]: wd } };
    });
  };

  return (
    <div className="p-4">
      <div className="flex items-center gap-2 mb-3">
        <TeamBadge manager={manager} size="sm" />
        <h4 className="display text-xl">{displayName(manager)}</h4>
      </div>
      <div className="space-y-2">
        {sorted.map(wr => {
          const results = weekData[wr.id] || [];
          const wrTotal = results.reduce((sum, r) => sum + (SCORING[r.type]?.for || 0), 0);
          return (
            <div key={wr.id} className="card-2 rounded p-2">
              <div className="flex items-center justify-between mb-1.5">
                <div className="flex items-center gap-2 text-sm">
                  <span className="mono text-zinc-500 text-xs w-8">{wr.weight}</span>
                  <span className="font-semibold">{wr.name}</span>
                  <span className="text-zinc-500 text-xs">· {wr.school}</span>
                </div>
                {wrTotal !== 0 && (
                  <span className={`mono font-bold text-sm ${wrTotal > 0 ? 'text-green-400' : 'text-rose-400'}`}>
                    {wrTotal > 0 ? '+' : ''}{wrTotal}
                  </span>
                )}
              </div>
              <div className="flex flex-wrap gap-1">
                {RESULT_KEYS.map(k => (
                  <button key={k} onClick={() => addResult(wr.id, k)}
                    className={`text-[10px] mono px-1.5 py-0.5 rounded font-bold transition ${SCORING[k].for > 0 ? 'bg-green-900/40 text-green-300 hover:bg-green-900' : 'bg-rose-900/40 text-rose-300 hover:bg-rose-900'}`}>
                    {SCORING[k].short} {SCORING[k].for > 0 ? '+' : ''}{SCORING[k].for}
                  </button>
                ))}
              </div>
              {results.length > 0 && (
                <div className="flex flex-wrap gap-1 mt-1.5">
                  {results.map((r, i) => (
                    <span key={i} onClick={() => removeResult(wr.id, i)}
                      className={`text-[10px] mono px-1.5 py-0.5 rounded cursor-pointer ${SCORING[r.type].for > 0 ? 'bg-green-700 text-white' : 'bg-rose-700 text-white'} hover:opacity-80`}
                      title="Click to remove">
                      {SCORING[r.type].short} ×
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {sorted.length === 0 && <div className="text-zinc-500 text-sm italic">No roster yet — finish the draft.</div>}
      </div>
    </div>
  );
}

// ========== STANDINGS ==========
function StandingsTab({ state }) {
  const standings = useMemo(() => {
    const data = state.managers.map(m => ({ manager: m, wins: 0, losses: 0, ties: 0, pf: 0, pa: 0, coachPts: 0, wrestlerPts: 0 }));
    const lookup = Object.fromEntries(data.map(d => [d.manager.id, d]));

    // Season totals from weeklyResults + pickem-derived coach points
    state.managers.forEach(m => {
      const tot = getManagerSeasonTotal(m.id, state);
      if (lookup[m.id]) {
        lookup[m.id].pf = tot.total;
        lookup[m.id].coachPts = tot.coach;
        lookup[m.id].wrestlerPts = tot.wrestler;
      }
    });

    // W/L/T from per-week head-to-head matchups (using full weekly totals)
    Object.entries(state.matchups).forEach(([wk, pairs]) => {
      pairs.forEach(p => {
        const ta = getManagerWeekTotal(p.managerA, wk, state).total;
        const tb = getManagerWeekTotal(p.managerB, wk, state).total;
        if (!lookup[p.managerA] || !lookup[p.managerB]) return;
        lookup[p.managerA].pa += tb;
        lookup[p.managerB].pa += ta;
        if (ta > tb) { lookup[p.managerA].wins++; lookup[p.managerB].losses++; }
        else if (tb > ta) { lookup[p.managerB].wins++; lookup[p.managerA].losses++; }
        else if (ta === tb && (ta !== 0 || tb !== 0)) { lookup[p.managerA].ties++; lookup[p.managerB].ties++; }
      });
    });

    return data.sort((a, b) => {
      const aPct = (a.wins + a.ties * 0.5) / Math.max(1, a.wins + a.losses + a.ties);
      const bPct = (b.wins + b.ties * 0.5) / Math.max(1, b.wins + b.losses + b.ties);
      if (bPct !== aPct) return bPct - aPct;
      return b.pf - a.pf;
    });
  }, [state.managers, state.weeklyResults, state.matchups, state.rosters, state.pickems, state.coachRosters, state.coaches]);

  // Projected payouts
  const pot = state.managers.filter(m => m.paid).length * (state.league.buyIn || 0);
  const pct = state.league.payoutPct || { first: 60, second: 30, third: 10 };
  const payouts = [
    Math.round(pot * pct.first / 100),
    Math.round(pot * pct.second / 100),
    Math.round(pot * pct.third / 100),
  ];

  return (
    <div className="space-y-4">
      <h2 className="display text-4xl">Standings</h2>

      {pot > 0 && (
        <div className="card-2 rounded-lg p-3 text-sm text-zinc-300 flex flex-wrap gap-3 items-center">
          <span className="pill pill-money">PROJECTED PAYOUTS · POT {money(pot)}</span>
          <span className="text-[var(--money)] mono">🥇 {money(payouts[0])}</span>
          <span className="text-[var(--gold)] mono">🥈 {money(payouts[1])}</span>
          <span className="text-amber-700 mono">🥉 {money(payouts[2])}</span>
        </div>
      )}

      <div className="card rounded-lg overflow-hidden">
        <table className="w-full">
          <thead className="bg-[var(--panel-2)]">
            <tr className="text-xs uppercase tracking-wider text-zinc-400">
              <th className="text-left px-4 py-3">#</th>
              <th className="text-left px-4 py-3">Manager</th>
              <th className="px-4 py-3">W</th>
              <th className="px-4 py-3">L</th>
              <th className="px-4 py-3">T</th>
              <th className="px-4 py-3">PCT</th>
              <th className="px-4 py-3" title="Wrestler points">WP</th>
              <th className="px-4 py-3" title="Coach points (from settled duals)">CP</th>
              <th className="px-4 py-3">PF</th>
              <th className="px-4 py-3">PA</th>
              <th className="px-4 py-3">DIFF</th>
              {pot > 0 && <th className="px-4 py-3">$</th>}
            </tr>
          </thead>
          <tbody>
            {standings.map((row, i) => {
              const total = row.wins + row.losses + row.ties;
              const pctStr = total > 0 ? ((row.wins + row.ties * 0.5) / total).toFixed(3) : '—';
              const diff = row.pf - row.pa;
              const payout = i < 3 ? payouts[i] : 0;
              return (
                <tr key={row.manager.id} className="border-t border-zinc-800">
                  <td className="px-4 py-3 mono">{i === 0 ? '🏆' : `${i + 1}.`}</td>
                  <td className="px-4 py-3 font-semibold">
                    <div className="flex items-center gap-2">
                      <TeamBadge manager={row.manager} size="sm" />
                      <div>
                        <div>{displayName(row.manager)}</div>
                        {row.manager.teamName && <div className="text-[10px] text-zinc-500 font-normal">{row.manager.name}</div>}
                      </div>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-center mono text-green-400 font-bold">{row.wins}</td>
                  <td className="px-4 py-3 text-center mono text-rose-400">{row.losses}</td>
                  <td className="px-4 py-3 text-center mono text-zinc-400">{row.ties}</td>
                  <td className="px-4 py-3 text-center mono">{pctStr}</td>
                  <td className="px-4 py-3 text-center mono text-zinc-300">{row.wrestlerPts}</td>
                  <td className={`px-4 py-3 text-center mono ${row.coachPts > 0 ? 'text-[var(--gold)]' : row.coachPts < 0 ? 'text-rose-400' : 'text-zinc-600'}`}>
                    {row.coachPts > 0 ? '+' : ''}{row.coachPts}
                  </td>
                  <td className="px-4 py-3 text-center mono text-[var(--gold)] font-bold">{row.pf}</td>
                  <td className="px-4 py-3 text-center mono text-zinc-400">{row.pa}</td>
                  <td className={`px-4 py-3 text-center mono ${diff > 0 ? 'text-green-400' : diff < 0 ? 'text-rose-400' : ''}`}>
                    {diff > 0 ? '+' : ''}{diff}
                  </td>
                  {pot > 0 && (
                    <td className={`px-4 py-3 text-center mono font-bold ${payout > 0 ? 'text-[var(--money)]' : 'text-zinc-700'}`}>
                      {payout > 0 ? money(payout) : '—'}
                    </td>
                  )}
                </tr>
              );
            })}
            {standings.length === 0 && (
              <tr><td colSpan={pot > 0 ? 12 : 11} className="px-4 py-8 text-center text-zinc-500">No managers yet.</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

      ...s,

  const weeks = useMemo(() => {
    return [...new Set(state.pickems.map(p => p.week))].sort((a, b) => a - b);
  }, [state.pickems]);

  const standings = useMemo(() => {
    const tally = Object.fromEntries(state.managers.map(m => [m.id, { manager: m, correct: 0, total: 0 }]));

      Object.entries(p.picks).forEach(([mid, pick]) => {
        if (!tally[mid]) return;
        tally[mid].total++;
        if (pick === p.winner) tally[mid].correct++;

    });
    return Object.values(tally).sort((a, b) => b.correct - a.correct);

              </div>
            ))}
          </div>
        </div>
      )}

      {weeks.length > 0 && (
        <div className="flex gap-1 flex-wrap">
          <button onClick={() => setWeekFilter('all')} className={`px-3 py-1.5 rounded text-sm font-semibold ${weekFilter === 'all' ? 'bg-[var(--red)] text-white' : 'card-2'}`}>All Weeks</button>
          {weeks.map(w => (
            <button key={w} onClick={() => setWeekFilter(String(w))} className={`px-3 py-1.5 rounded text-sm font-semibold ${weekFilter === String(w) ? 'bg-[var(--red)] text-white' : 'card-2'}`}>Wk {w}</button>
          ))}
        </div>
      )}

      <div className="space-y-3">
        {filtered.map(dual => (
          <PickemCard key={dual.id} dual={dual} state={state} setPick={setPick} setWinner={setWinner} onDelete={() => deleteDual(dual.id)} />
        ))}

          <div className="card rounded-lg p-8 text-center text-zinc-400">
            <div className="display text-2xl mb-2">No duals yet</div>

        )}

      {showAdd && <AddDualModal currentWeek={getCurrentWeek(state.league)} onAdd={addDual} onClose={() => setShowAdd(false)} />}
    </div>
  );
}

function PickemCard({ dual, state, setPick, setWinner, onDelete }) {
  const settled = !!dual.winner;
  const [scoreA, setScoreA] = useState(dual.scoreA ?? '');
  const [scoreB, setScoreB] = useState(dual.scoreB ?? '');

  const submitResult = (winner) => {
    const sA = parseInt(scoreA), sB = parseInt(scoreB);
    if (!isFinite(sA) || !isFinite(sB)) {
      if (!confirm(`No scores entered. Submit as a ${winner === 'A' ? dual.teamA : dual.teamB} win with default coach scoring (+/-10)?`)) return;
    }
    setWinner(dual.id, winner, scoreA, scoreB);
  };

  // Margin display once settled
  const settledMargin = settled && isFinite(parseInt(dual.scoreA)) && isFinite(parseInt(dual.scoreB))
    ? Math.abs(parseInt(dual.scoreA) - parseInt(dual.scoreB)) : null;
  const coachTier = settledMargin === null ? null : settledMargin >= 21 ? 15 : settledMargin >= 11 ? 10 : 5;

  return (
    <div className="card rounded-lg p-4">
      <div className="flex items-start justify-between mb-3 flex-wrap gap-2">
        <div>
          <div className="text-xs text-zinc-500 uppercase tracking-wider">Week {dual.week} {dual.label && `· ${dual.label}`}</div>
          <div className="display text-2xl mt-1">{dual.teamA} <span className="text-zinc-500 text-lg">vs</span> {dual.teamB}</div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {settled ? (
            <>
              <span className="pill pill-green">
                {dual.winner === 'A' ? dual.teamA : dual.teamB} won
                {isFinite(parseInt(dual.scoreA)) && isFinite(parseInt(dual.scoreB)) && (
                  <span className="ml-1 mono">{dual.scoreA}-{dual.scoreB}</span>
                )}
              </span>
              {coachTier !== null && (
                <span className="pill" style={{ background: coachTier === 15 ? '#dc2626' : coachTier === 10 ? '#f59e0b' : '#3b82f6', color: '#fff' }}>
                  Coach +{coachTier}
                </span>
              )}
            </>
          ) : (
            <div className="flex items-center gap-1 flex-wrap">
              <div className="flex items-center gap-1 text-xs">
                <span className="text-zinc-400">Score:</span>
                <input
                  type="number"
                  min="0"
                  value={scoreA}
                  onChange={e => setScoreA(e.target.value)}
                  placeholder={dual.teamA.slice(0,3)}
                  className="w-14 text-center mono text-sm"
                />
                <span className="text-zinc-500">–</span>
                <input
                  type="number"
                  min="0"
                  value={scoreB}
                  onChange={e => setScoreB(e.target.value)}
                  placeholder={dual.teamB.slice(0,3)}
                  className="w-14 text-center mono text-sm"
                />
              </div>
              <button onClick={() => submitResult('A')} className="secondary text-xs">{dual.teamA.slice(0,3).toUpperCase()} won</button>
              <button onClick={() => submitResult('B')} className="secondary text-xs">{dual.teamB.slice(0,3).toUpperCase()} won</button>
            </div>
          )}
          {settled && <button onClick={() => setWinner(dual.id, null)} className="ghost text-xs">Undo</button>}
          <button onClick={onDelete} className="ghost text-xs text-rose-400">×</button>
        </div>
      </div>
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">
        {state.managers.map(m => {
          const pick = dual.picks[m.id];
          const correct = settled && pick === dual.winner;
          const wrong = settled && pick && pick !== dual.winner;
          return (
            <div key={m.id} className="card-2 rounded p-2">
              <div className="flex items-center gap-1.5 text-xs mb-1">
                <TeamBadge manager={m} size="xs" />
                <span className="truncate">{displayName(m)}</span>
                {correct && <span className="text-green-400 ml-auto">✓</span>}
                {wrong && <span className="text-rose-400 ml-auto">✗</span>}
              </div>
              <div className="flex gap-1">
                <button onClick={() => setPick(dual.id, m.id, 'A')} disabled={settled}
                  className={`flex-1 text-[11px] font-bold py-1 rounded ${pick === 'A' ? 'bg-[var(--red)] text-white' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>
                  {dual.teamA.slice(0, 3).toUpperCase()}
                </button>
                <button onClick={() => setPick(dual.id, m.id, 'B')} disabled={settled}
                  className={`flex-1 text-[11px] font-bold py-1 rounded ${pick === 'B' ? 'bg-[var(--red)] text-white' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>
                  {dual.teamB.slice(0, 3).toUpperCase()}
                </button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-zinc-400 block mb-1">Week</label>
              <input type="number" min="1" value={week} onChange={e => setWeek(parseInt(e.target.value) || 1)} className="w-full" />
            </div>
            <div>
              <label className="text-xs text-zinc-400 block mb-1">Label (optional)</label>
              <input value={label} onChange={e => setLabel(e.target.value)} className="w-full" placeholder="e.g. Big Ten" />
            </div>
          </div>
        </div>
        <div className="flex justify-end gap-2 mt-5">
          <button onClick={onClose} className="secondary">Cancel</button>
          <button onClick={() => teamA && teamB && onAdd({ teamA, teamB, week, label })} className="primary">Add Dual</button>
        </div>
      </div>
    </div>
  );
}

// ========== BRACKET ==========
function BracketTab({ state, update }) {
  const [activeManager, setActiveManager] = useState(state.managers[0]?.id || '');

  useEffect(() => {
    if (!activeManager && state.managers.length > 0) setActiveManager(state.managers[0].id);
  }, [state.managers]);

  const setWins = (wrestlerId, count) => {
    update(s => ({
      ...s,
      bracket: {
        ...s.bracket,
        wins: { ...(s.bracket.wins || {}), [wrestlerId]: Math.max(0, parseInt(count) || 0) },
      },
    }));
  };

  // Standings: total NCAA wins per manager, summed across their drafted wrestlers
  const standings = useMemo(() => {
    return state.managers.map(m => {
      const roster = state.rosters[m.id] || [];
      const wrestlersWithWins = roster
        .map(wid => {
          const w = state.wrestlers.find(x => x.id === wid);
          if (!w) return null;
          const wins = (state.bracket.wins || {})[wid] || 0;
          return { wrestler: w, wins };
        })
        .filter(Boolean);
      const totalWins = wrestlersWithWins.reduce((sum, x) => sum + x.wins, 0);
      return { manager: m, totalWins, wrestlersWithWins };
    }).sort((a, b) => b.totalWins - a.totalWins);
  }, [state.bracket, state.rosters, state.managers, state.wrestlers]);

  const activeData = standings.find(s => s.manager.id === activeManager);

  return (
    <div className="space-y-4">
      <div className="flex flex-wrap items-center justify-between gap-3">
        <h2 className="display text-4xl">NCAA Tournament Wins</h2>
        <div className="text-xs text-zinc-400 mono">Each win = +1 point to that wrestler's manager</div>
      </div>

      <div className="card-2 rounded p-3 text-sm text-zinc-300">
        <span className="font-bold text-[var(--gold)]">How it works: </span>
        Track each of your drafted wrestlers' NCAA Tournament wins. Every match win (championship bracket OR consolation) adds 1 point to your team total. A champion typically gets 5-6 wins. An 8th place finisher might get 4-5. A first-round-and-out wrestler gets 0-1.
      </div>

      {/* Manager tabs */}
      <div className="flex flex-wrap gap-1">
        {state.managers.map(m => (
          <button key={m.id} onClick={() => setActiveManager(m.id)}
            className={`px-2 py-1.5 rounded text-sm font-semibold flex items-center gap-1.5 ${m.id === activeManager ? 'text-white' : 'card-2 text-zinc-300'}`}
            style={m.id === activeManager ? { background: m.color } : {}}>
            <TeamBadge manager={m} size="xs" />
            <span>{displayName(m)}</span>
            <span className="text-[var(--gold)] mono">{(standings.find(s => s.manager.id === m.id) || {}).totalWins || 0}</span>
          </button>
        ))}
      </div>

      {/* Win-entry view */}
      {activeData && (
        <div className="card rounded-lg p-4">
          <div className="flex items-center justify-between mb-3">
            <h3 className="display text-2xl">{displayName(activeData.manager)}'s NCAA Wins</h3>
            <div className="text-right">
              <div className="text-xs text-zinc-500 uppercase">Team total</div>
              <div className="display text-4xl text-[var(--gold)]">{activeData.totalWins}</div>
            </div>
          </div>
          {activeData.wrestlersWithWins.length === 0 ? (
            <div className="text-zinc-500 italic text-center py-6">No wrestlers drafted yet.</div>
          ) : (
            <div className="space-y-1">
              {activeData.wrestlersWithWins
                .slice()
                .sort((a, b) => a.wrestler.weight - b.wrestler.weight || a.wrestler.rank - b.wrestler.rank)
                .map(({ wrestler, wins }) => (
                  <div key={wrestler.id} className="card-2 rounded p-2 flex items-center gap-3">
                    <span className="mono text-xs text-zinc-500 w-10">{wrestler.weight}</span>
                    <WrestlerAvatar wrestler={wrestler} size="sm" />
                    <div className="flex-1 min-w-0">
                      <div className="font-semibold truncate">{wrestler.name}</div>
                      <div className="text-xs text-zinc-500 truncate">{wrestler.school}</div>
                    </div>
                    <div className="flex items-center gap-2">
                      <button onClick={() => setWins(wrestler.id, wins - 1)} className="card-2 px-2 py-1 rounded text-sm" disabled={wins <= 0}>−</button>
                      <input
                        type="number"
                        min="0"
                        max="10"
                        value={wins}
                        onChange={e => setWins(wrestler.id, e.target.value)}
                        className="w-14 text-center mono"
                      />
                      <button onClick={() => setWins(wrestler.id, wins + 1)} className="card-2 px-2 py-1 rounded text-sm">+</button>
                      <span className="text-xs text-zinc-500 uppercase ml-1">wins</span>
                    </div>
                  </div>
                ))}
            </div>
          )}
        </div>
      )}

      {/* Standings */}
      <div className="card rounded-lg p-4">
        <h3 className="display text-2xl mb-3">NCAA Tournament Standings</h3>
        <div className="space-y-2">
          {standings.map((s, i) => (
            <div key={s.manager.id} className="card-2 rounded p-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <span className="display text-2xl text-zinc-500 w-8">{i === 0 ? '🏆' : `#${i + 1}`}</span>
                <TeamBadge manager={s.manager} size="sm" />
                <span className="font-semibold">{displayName(s.manager)}</span>
              </div>
              <span className="display text-3xl text-[var(--gold)]">{s.totalWins}</span>
            </div>
          ))}
          {standings.length === 0 && <div className="text-zinc-500 text-center py-6">No managers yet.</div>}
        </div>
      </div>
    </div>
  );
}

// ========== MONEY ==========
function MoneyTab({ state, update }) {
  const buyIn = state.league.buyIn || 0;
  const pct = state.league.payoutPct || { first: 60, second: 30, third: 10 };
  const totalPaid = state.managers.filter(m => m.paid).length;
  const totalOwed = state.managers.length - totalPaid;
  const pot = totalPaid * buyIn;
  const expectedPot = state.managers.length * buyIn;

  const setBuyIn = (val) => update(s => ({ ...s, league: { ...s.league, buyIn: parseFloat(val) || 0 } }));
  const setPct = (k, val) => update(s => ({ ...s, league: { ...s.league, payoutPct: { ...s.league.payoutPct, [k]: parseFloat(val) || 0 } } }));
  const togglePaid = (id) => update(s => ({ ...s, managers: s.managers.map(m => m.id === id ? { ...m, paid: !m.paid } : m) }));

  const totalPct = (pct.first || 0) + (pct.second || 0) + (pct.third || 0);
  const pctOk = Math.abs(totalPct - 100) < 0.01;

  const payouts = [
    Math.round(pot * pct.first / 100),
    Math.round(pot * pct.second / 100),
    Math.round(pot * pct.third / 100),
  ];

  return (
    <div className="space-y-6">
      <h2 className="display text-4xl flex items-center gap-3">💰 Money</h2>

      {/* Pot summary */}
      <div className="card rounded-lg overflow-hidden glow-money">
        <div className="p-6 stripe-money">
          <div className="text-xs uppercase tracking-wider text-[var(--money)] mb-1">Current Pot</div>
          <div className="display text-7xl text-[var(--money)] leading-none">{money(pot)}</div>
          <div className="text-zinc-400 text-sm mt-2">
            {totalPaid} of {state.managers.length} paid · Expected: {money(expectedPot)} · Outstanding: {money(buyIn * totalOwed)}
          </div>
        </div>
      </div>

      {/* Buy-in & payouts config */}
      <div className="card rounded-lg p-6">
        <h3 className="display text-2xl mb-4">League Buy-in & Payouts</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div>
            <label className="text-xs text-zinc-400 block mb-1">Buy-in per Manager ($)</label>
            <input type="number" min="0" step="5" value={buyIn} onChange={e => setBuyIn(e.target.value)} className="w-full" />
          </div>
          <div>
            <label className="text-xs text-zinc-400 block mb-2">Payout Structure</label>
            <div className="grid grid-cols-3 gap-2">
              <div>
                <div className="text-[10px] text-zinc-500 mb-1">🥇 1st %</div>
                <input type="number" min="0" max="100" value={pct.first} onChange={e => setPct('first', e.target.value)} className="w-full" />
              </div>
              <div>
                <div className="text-[10px] text-zinc-500 mb-1">🥈 2nd %</div>
                <input type="number" min="0" max="100" value={pct.second} onChange={e => setPct('second', e.target.value)} className="w-full" />
              </div>
              <div>
                <div className="text-[10px] text-zinc-500 mb-1">🥉 3rd %</div>
                <input type="number" min="0" max="100" value={pct.third} onChange={e => setPct('third', e.target.value)} className="w-full" />
              </div>
            </div>
            {!pctOk && <div className="text-xs text-rose-400 mt-2">⚠ Payouts add up to {totalPct}% (should be 100%)</div>}
          </div>
        </div>

        {pot > 0 && (
          <div className="mt-5 grid grid-cols-3 gap-3">
            <div className="card-2 rounded p-3 text-center">
              <div className="text-xs text-zinc-500 uppercase tracking-wider">🥇 1st Place</div>
              <div className="display text-3xl text-[var(--money)]">{money(payouts[0])}</div>
            </div>
            <div className="card-2 rounded p-3 text-center">
              <div className="text-xs text-zinc-500 uppercase tracking-wider">🥈 2nd Place</div>
              <div className="display text-3xl text-[var(--gold)]">{money(payouts[1])}</div>
            </div>
            <div className="card-2 rounded p-3 text-center">
              <div className="text-xs text-zinc-500 uppercase tracking-wider">🥉 3rd Place</div>
              <div className="display text-3xl text-amber-700">{money(payouts[2])}</div>
            </div>
          </div>
        )}
      </div>

      {/* Paid status */}
      <div className="card rounded-lg p-6">
        <h3 className="display text-2xl mb-4">Payment Tracker</h3>
        {state.managers.length === 0 ? (
          <div className="text-zinc-500 italic">Add managers in Setup first.</div>
        ) : (
          <div className="space-y-2">
            {state.managers.map(m => (
              <div key={m.id} className="card-2 rounded p-3 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <TeamBadge manager={m} size="sm" />
                  <div>
                    <div className="font-semibold">{displayName(m)}</div>
                    {m.teamName && <div className="text-xs text-zinc-500">{m.name}</div>}
                  </div>
                </div>
                <div className="flex items-center gap-3">
                  <span className={`mono text-sm ${m.paid ? 'text-[var(--money)]' : 'text-zinc-500'}`}>
                    {m.paid ? `Paid ${money(buyIn)}` : `Owes ${money(buyIn)}`}
                  </span>
                  <button onClick={() => togglePaid(m.id)}
                    className={`px-3 py-1.5 rounded text-xs font-bold ${m.paid ? 'bg-[var(--money)] text-black' : 'card-2'}`}>
                    {m.paid ? '✓ PAID' : 'MARK PAID'}
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ========== FOOTER ==========
function Footer() {
  return (
    <footer className="border-t border-zinc-800 py-4 mt-8">
      <div className="max-w-7xl mx-auto px-4 sm:px-6 text-xs text-zinc-500 flex flex-wrap justify-between gap-2">
        <span>Mat Kings · Fantasy College Wrestling</span>
        <span className="mono">Data saved to your browser · 0 servers</span>
      </div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
